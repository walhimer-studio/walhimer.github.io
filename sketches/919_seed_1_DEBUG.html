<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Emergent DNA - Seed 1</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.2/p5.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      /* EXHIBITION SPECS: Vertical 9:16 format - 2160 x 3840 pixels */
      width: 2160px;
      height: 3840px;
      position: relative;
    }
    
    canvas {
      display: block;
      touch-action: none;
      position: absolute;
      top: 0;
      left: 0;
    }
    
    /* Control Panel */
    #controls {
      position: absolute;
      top: 20px;
      right: 20px;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
      width: 280px;
      max-height: 90vh;
      overflow-y: auto;
      z-index: 1000;
      transition: transform 0.3s ease, opacity 0.3s ease;
    }
    
    #controls.hidden {
      transform: translateX(320px);
      opacity: 0;
      pointer-events: none;
    }
    
    #controls h2 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 16px;
      color: #000;
    }
    
    .control-group {
      margin-bottom: 20px;
    }
    
    .control-group label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: #666;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    .control-group input[type="range"] {
      width: 100%;
      height: 6px;
      border-radius: 3px;
      background: #e0e0e0;
      outline: none;
      -webkit-appearance: none;
    }
    
    .control-group input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #000;
      cursor: pointer;
      transition: transform 0.1s ease;
    }
    
    .control-group input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.2);
    }
    
    .control-group input[type="range"]::-moz-range-thumb {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #000;
      cursor: pointer;
      border: none;
      transition: transform 0.1s ease;
    }
    
    .control-group input[type="range"]::-moz-range-thumb:hover {
      transform: scale(1.2);
    }
    
    .value-display {
      font-size: 14px;
      color: #000;
      font-weight: 600;
      margin-top: 4px;
    }
    
    /* Toggle Button */
    #toggleControls {
      position: absolute;
      top: 20px;
      right: 20px;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border: none;
      border-radius: 50%;
      width: 48px;
      height: 48px;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      z-index: 999;
      transition: transform 0.2s ease;
    }
    
    #toggleControls:hover {
      transform: scale(1.1);
    }
    
    #toggleControls.hidden {
      display: none;
    }
    
    /* Info Badge */
    #info {
      position: absolute;
      bottom: 20px;
      left: 20px;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 12px;
      color: #666;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
    }
    
    #info strong {
      color: #000;
      display: block;
      margin-bottom: 4px;
    }
    
    /* Start Button */
    #startButton {
      width: 100%;
      background: black;
      color: white;
      border: none;
      padding: 20px;
      font-size: 18px;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.2s ease, background 0.2s ease;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin-bottom: 20px;
    }
    
    #startButton:hover {
      transform: scale(1.02);
      background: #333;
    }
    
    #startButton.started {
      display: none;
    }
    
    #countdown {
      width: 100%;
      background: black;
      color: white;
      padding: 20px;
      font-size: 48px;
      font-weight: 700;
      border-radius: 8px;
      text-align: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin-bottom: 20px;
      display: none;
    }
    
    #countdown.active {
      display: block;
    }
    
    /* Mobile Responsive - kept for testing but won't be used in exhibition */
    @media (max-width: 768px) {
      #controls {
        width: calc(100vw - 40px);
        max-width: 320px;
        top: auto;
        bottom: 20px;
        right: 20px;
        max-height: 60vh;
      }
      
      #controls.hidden {
        transform: translateY(calc(100% + 40px));
      }
      
      #toggleControls {
        top: auto;
        bottom: 20px;
        right: 20px;
      }
    }
  </style>
</head>
<body>
  <!-- Toggle Button -->
  <button id="toggleControls">⚙️</button>
  
  <!-- Control Panel -->
  <div id="controls">
    <h2>DNA Parameters</h2>
    
    <button id="startButton">START</button>
    <div id="countdown"></div>
    
    <div class="control-group">
      <label>Lifespan</label>
      <input type="range" id="lifespan" min="0" max="17" step="1" value="9">
      <div class="value-display" id="lifespanValue">6h</div>
    </div>
    
    <div class="control-group">
      <label>Rotation Speed</label>
      <input type="range" id="rotSpeed" min="0.1" max="3.0" step="0.1" value="1.0">
      <div class="value-display" id="rotSpeedValue">1.0</div>
    </div>
    
    <div class="control-group">
      <label>Breath Speed</label>
      <input type="range" id="breathSpeed" min="0.1" max="3.0" step="0.1" value="1.0">
      <div class="value-display" id="breathSpeedValue">1.0</div>
    </div>
    
    <div class="control-group">
      <label>Box Size</label>
      <input type="range" id="boxSize" min="0.3" max="2.0" step="0.1" value="1.0">
      <div class="value-display" id="boxSizeValue">1.0</div>
    </div>
    
    <div class="control-group">
      <label>Alpha Min</label>
      <input type="range" id="alphaMin" min="0.05" max="0.8" step="0.05" value="0.35">
      <div class="value-display" id="alphaMinValue">0.35</div>
    </div>
    
    <div class="control-group">
      <label>Alpha Max</label>
      <input type="range" id="alphaMax" min="0.5" max="1.0" step="0.02" value="0.92">
      <div class="value-display" id="alphaMaxValue">0.92</div>
    </div>
    
    <div class="control-group">
      <label>Saturation</label>
      <input type="range" id="saturation" min="0" max="100" step="5" value="80">
      <div class="value-display" id="saturationValue">80</div>
    </div>
    
    <div class="control-group">
      <label>Brightness</label>
      <input type="range" id="brightness" min="50" max="100" step="5" value="95">
      <div class="value-display" id="brightnessValue">95</div>
    </div>
    
    <div class="control-group">
      <label>Hue Spread</label>
      <input type="range" id="hueSpread" min="0" max="360" step="10" value="140">
      <div class="value-display" id="hueSpreadValue">140</div>
    </div>
    
    <div class="control-group">
      <label>Background Color</label>
      <input type="range" id="bgColor" min="0" max="9" step="1" value="0">
      <div class="value-display" id="bgColorValue">White</div>
    </div>
  </div>
  
  <!-- Info Badge -->
  <div id="info">
    <strong>Emergent DNA</strong>
    Mark Walhimer
  </div>

  <script>
    "use strict";
    
    // ============================================
    // EXHIBITION SEED - CHANGE THIS FOR DIFFERENT VERSIONS
    // ============================================
    const SEED = 1;  // CHANGE TO 2, 3, 4, etc. for different compositions
    
    // ============================================
    // SEEDED RANDOM GENERATOR (Manifold Compatible)
    // ============================================
    
    // Get token ID from URL or use default for testing
    const urlParams = new URLSearchParams(window.location.search);
    const tokenId = urlParams.get('tokenId') || '0';
    
    // Simple hash function for seed generation
    function hashCode(str) {
      let hash = 0;
      for (let i = 0; i < str.length; i++) {
        const char = str.charCodeAt(i);
        hash = ((hash << 5) - hash) + char;
        hash = hash & hash;
      }
      return hash;
    }
    
    // Seeded random number generator
    class SeededRandom {
      constructor(seed) {
        this.seed = seed;
      }
      
      random() {
        const x = Math.sin(this.seed++) * 10000;
        return x - Math.floor(x);
      }
    }
    
    const seed = hashCode(tokenId);
    const seededRandom = new SeededRandom(seed);
    
    // ============================================
    // PARAMETERS
    // ============================================
    
    // Background color presets (HSB values)
    const BG_PRESETS = [
      { label: "White", h: 0, s: 0, b: 100 },
      { label: "Grey", h: 0, s: 0, b: 60 },
      { label: "Beige", h: 40, s: 20, b: 85 },
      { label: "Light Blue", h: 200, s: 30, b: 80 },
      { label: "Pink", h: 330, s: 25, b: 90 },
      { label: "Orange", h: 30, s: 35, b: 85 },
      { label: "Yellow", h: 50, s: 30, b: 95 },
      { label: "Cream", h: 45, s: 15, b: 95 },
      { label: "Green", h: 120, s: 25, b: 75 },
      { label: "Black", h: 0, s: 0, b: 10 }
    ];
    
    const params = {
      rotSpeed: 1.0,
      breathSpeed: 1.0,
      boxSize: 1.0,
      alphaMin: 0.35,
      alphaMax: 0.92,
      saturation: 80,
      brightness: 95,
      hueSpread: 140,
      bgColor: 0,
      lifespan: 9
    };
    
    // Lifespan presets (seconds and max boxes)
    const LIFESPAN_OPTIONS = [
      { label: "30s", seconds: 30, maxBoxes: 50 },
      { label: "1m", seconds: 60, maxBoxes: 100 },
      { label: "2m", seconds: 120, maxBoxes: 150 },
      { label: "5m", seconds: 300, maxBoxes: 250 },
      { label: "10m", seconds: 600, maxBoxes: 350 },
      { label: "20m", seconds: 1200, maxBoxes: 500 },
      { label: "30m", seconds: 1800, maxBoxes: 650 },
      { label: "1h", seconds: 3600, maxBoxes: 800 },
      { label: "2h", seconds: 7200, maxBoxes: 1000 },
      { label: "6h", seconds: 21600, maxBoxes: 1200 },
      { label: "12h", seconds: 43200, maxBoxes: 1400 },
      { label: "1d", seconds: 86400, maxBoxes: 1600 },
      { label: "2d", seconds: 172800, maxBoxes: 1800 },
      { label: "1w", seconds: 604800, maxBoxes: 2000 },
      { label: "2w", seconds: 1209600, maxBoxes: 2000 },
      { label: "1mo", seconds: 2592000, maxBoxes: 2000 },
      { label: "2mo", seconds: 5184000, maxBoxes: 2000 },
      { label: "3mo", seconds: 7776000, maxBoxes: 2000 }
    ];
    
    // ============================================
    // UI CONTROLS
    // ============================================
    
    // Update parameter values from sliders
    function setupControls() {
      const controls = [
        'rotSpeed', 'breathSpeed', 'boxSize', 'alphaMin', 
        'alphaMax', 'saturation', 'brightness', 'hueSpread', 'bgColor', 'lifespan'
      ];
      
      controls.forEach(name => {
        const slider = document.getElementById(name);
        const display = document.getElementById(name + 'Value');
        
        slider.addEventListener('input', (e) => {
          const value = parseFloat(e.target.value);
          params[name] = value;
          
          // Special display for lifespan
          if (name === 'lifespan') {
            const idx = Math.floor(value);
            display.textContent = LIFESPAN_OPTIONS[idx].label;
            // Reset growth when lifespan changes
            if (hasStarted) {
              startTime = millis();
            }
          } else if (name === 'bgColor') {
            const idx = Math.floor(value);
            display.textContent = BG_PRESETS[idx].label;
          } else {
            display.textContent = value;
          }
        });
        
        // Initialize display values
        if (name === 'lifespan') {
          const idx = Math.floor(params[name]);
          display.textContent = LIFESPAN_OPTIONS[idx].label;
        } else if (name === 'bgColor') {
          const idx = Math.floor(params[name]);
          display.textContent = BG_PRESETS[idx].label;
        } else {
          display.textContent = params[name];
        }
      });
      
      // Toggle controls visibility
      const toggleBtn = document.getElementById('toggleControls');
      const controlsPanel = document.getElementById('controls');
      let controlsVisible = true;
      
      toggleBtn.addEventListener('click', () => {
        controlsVisible = !controlsVisible;
        if (controlsVisible) {
          controlsPanel.classList.remove('hidden');
          toggleBtn.classList.remove('hidden');
        } else {
          controlsPanel.classList.add('hidden');
        }
      });
    }
    
    // ============================================
    // P5.JS SKETCH
    // ============================================
    
    let dnaState;
    let startTime;
    let hasStarted = false;
    let isCountingDown = false;
    let countdownValue = 10;
    
    function setup() {
      randomSeed(SEED);  // Uses SEED constant for p5.js random functions
      
      // EXHIBITION SPECS: 2160 x 3840 vertical format, 30 FPS required
      createCanvas(2160, 3840, WEBGL);
      pixelDensity(1);  // Fixed pixel density for consistent performance
      frameRate(30);  // REQUIRED: 30 FPS for exhibition video specs
      
      // Perspective optimized for vertical 9:16 format
      perspective(PI / 3, 2160 / 3840, 0.1, 10000);
      
      colorMode(HSB, 360, 100, 100, 1);
      noStroke();
      
      dnaState = buildDNAState();
      setupControls();
      setupStartButton();
    }
    
    function setupStartButton() {
      const startButton = document.getElementById('startButton');
      const countdownDisplay = document.getElementById('countdown');
      
      startButton.addEventListener('click', () => {
        // Hide button, show countdown
        isCountingDown = true;
        startButton.classList.add('started');
        countdownDisplay.classList.add('active');
        countdownDisplay.textContent = countdownValue;
        
        // Countdown interval
        const countdownInterval = setInterval(() => {
          countdownValue--;
          if (countdownValue > 0) {
            countdownDisplay.textContent = countdownValue;
          } else {
            clearInterval(countdownInterval);
            // Start the actual timer
            isCountingDown = false;
            hasStarted = true;
            startTime = millis();
            // Hide countdown
            countdownDisplay.classList.remove('active');
          }
        }, 1000);
      });
    }
    
    function buildDNAState() {
      const machines = [];
      const particles = [];
      
      // Create multiple machine objects
      for (let i = 0; i < 3; i++) {
        const machine = {
          x: seededRandom.random() * 800 - 400,
          y: seededRandom.random() * 400 - 200,
          z: seededRandom.random() * 600 - 300,
          rotX: seededRandom.random() * TWO_PI,
          rotY: seededRandom.random() * TWO_PI,
          rotZ: seededRandom.random() * TWO_PI,
          rotSpeedX: seededRandom.random() * 0.02 + 0.01,
          rotSpeedY: seededRandom.random() * 0.02 + 0.01,
          rotSpeedZ: seededRandom.random() * 0.02 + 0.01,
          scale: seededRandom.random() * 0.7 + 0.5,
          hue: seededRandom.random() * 60 + 300,
          components: []
        };
        
        // Add components to each machine
        for (let j = 0; j < 8; j++) {
          machine.components.push({
            type: Math.floor(seededRandom.random() * 4),
            x: seededRandom.random() * 160 - 80,
            y: seededRandom.random() * 160 - 80,
            z: seededRandom.random() * 160 - 80,
            size: seededRandom.random() * 25 + 15,
            rotSpeed: seededRandom.random() * 0.06 + 0.02,
            phase: seededRandom.random() * TWO_PI
          });
        }
        machines.push(machine);
      }
      
      // Create particle system
      for (let i = 0; i < 200; i++) {
        particles.push({
          x: seededRandom.random() * 1600 - 800,
          y: seededRandom.random() * 1200 - 600,
          z: seededRandom.random() * 1600 - 800,
          vx: seededRandom.random() - 0.5,
          vy: seededRandom.random() - 0.5,
          vz: seededRandom.random() - 0.5,
          life: seededRandom.random() * 155 + 100,
          size: seededRandom.random() * 6 + 2,
          hue: seededRandom.random() * 80 + 280
        });
      }
      
      return { machines, particles };
    }
    
    function draw() {
      // Background - use preset color
      const bgPreset = BG_PRESETS[Math.floor(params.bgColor)];
      background(bgPreset.h, bgPreset.s, bgPreset.b);
      
      const t = millis();
      
      // PREVIEW MODE - show one rotating machine in center before start
      if (!hasStarted) {
        const globalRotation = t * 0.0002 * params.rotSpeed;
        
        // Camera movement for preview
        const camX = cos(globalRotation) * 600;
        const camY = sin(globalRotation * 0.8) * 400;
        const camZ = sin(globalRotation * 1.2) * 500 + 400;
        camera(camX, camY, camZ, 0, 0, 0, 0, 1, 0);
        
        // Atmospheric lighting
        ambientLight(params.hueSpread, 40, 30);
        directionalLight(params.hueSpread + 20, 60, 80, -1, 0.5, -1);
        pointLight(params.hueSpread + 40, 80, 90, 200, -200, 300);
        
        // Draw single preview machine
        push();
        const previewMachine = dnaState.machines[0];
        translate(0, 0, 0);
        scale(params.boxSize);
        
        rotateX(globalRotation);
        rotateY(globalRotation * 0.7);
        rotateZ(globalRotation * 1.3);
        
        // Core
        for (let i = 0; i < 8; i++) {
          const alpha = map(i, 0, 7, params.alphaMax, params.alphaMin);
          const coreHue = (previewMachine.hue + t * 0.2 * params.breathSpeed) % 360;
          
          fill(coreHue, params.saturation, params.brightness, alpha);
          noStroke();
          
          push();
          scale(1 + i * 0.15);
          box(60);
          pop();
        }
        pop();
        
        return;
      }
      
      const elapsedSeconds = (t - startTime) / 1000;
      
      // Get current lifespan settings
      const lifespanIdx = Math.floor(params.lifespan);
      const lifespanData = LIFESPAN_OPTIONS[lifespanIdx];
      const totalLifeSeconds = lifespanData.seconds;
      
      // Calculate life progress (0-1)
      const lifeProgress = Math.min(elapsedSeconds / totalLifeSeconds, 1.0);
      
      // Camera movement
      const camX = cos(t * 0.001 * params.rotSpeed) * 600;
      const camY = sin(t * 0.0008 * params.rotSpeed) * 400;
      const camZ = sin(t * 0.0012 * params.rotSpeed) * 500 + 400;
      camera(camX, camY, camZ, 0, 0, 0, 0, 1, 0);
      
      // Atmospheric lighting
      ambientLight(params.hueSpread, 40, 30);
      directionalLight(params.hueSpread + 20, 60, 80, -1, 0.5, -1);
      pointLight(params.hueSpread + 40, 80, 90, 200, -200, 300);
      
      // Draw painterly background volumes
      drawBackgroundVolumes(t, lifeProgress);
      
      // Draw machines with gradual appearance based on lifeProgress
      const totalMachines = dnaState.machines.length;
      for (let i = 0; i < totalMachines; i++) {
        // Calculate when this machine should start appearing (staggered)
        const machineStartProgress = i / totalMachines;
        const machineEndProgress = (i + 1) / totalMachines;
        
        // Only draw if we've reached this machine's time
        if (lifeProgress > machineStartProgress) {
          // Calculate fade-in for this machine (0-1)
          const machineFade = Math.min((lifeProgress - machineStartProgress) / (machineEndProgress - machineStartProgress), 1.0);
          drawMachine(dnaState.machines[i], t, machineFade, lifeProgress);
        }
      }
      
      // Draw and update particles with fade based on progress
      drawParticles(t, lifeProgress);
      
      // DEBUG: Display lifeProgress on screen
      push();
      camera();
      fill(0);
      noStroke();
      textSize(24);
      textAlign(LEFT, TOP);
      text(`Elapsed: ${elapsedSeconds.toFixed(1)}s`, 20, 20);
      text(`Total: ${totalLifeSeconds}s (${lifespanData.label})`, 20, 50);
      text(`Progress: ${(lifeProgress * 100).toFixed(2)}%`, 20, 80);
      text(`Machines visible: ${dnaState.machines.filter((_, i) => lifeProgress > i / totalMachines).length}/${totalMachines}`, 20, 110);
      pop();
    }
    
    function drawBackgroundVolumes(t, lifeProgress = 1.0) {
      push();
      noFill();
      
      for (let i = 0; i < 5; i++) {
        push();
        const x = cos(t * 0.003 + i * 2) * 300;
        const y = sin(t * 0.002 + i * 1.5) * 200;
        const z = sin(t * 0.004 + i) * 400;
        translate(x, y, z);
        
        rotateX(t * 0.002 + i);
        rotateY(t * 0.003 + i * 0.7);
        
        for (let j = 0; j < 15; j++) {
          const alpha = map(j, 0, 14, params.alphaMax, params.alphaMin) * lifeProgress;
          const size = 150 + j * 30;
          const hue = (t * 0.5 * params.breathSpeed + i * 60 + j * 10) % 360;
          
          stroke(hue, params.saturation, params.brightness, alpha);
          strokeWeight(3 - j * 0.1);
          
          push();
          scale(1 + j * 0.1);
          
          if (i % 2 === 0) {
            sphere(size * params.boxSize);
          } else {
            torus(size * params.boxSize, size * 0.3 * params.boxSize);
          }
          pop();
        }
        pop();
      }
      pop();
    }
    
    function drawMachine(machine, t, machineFade = 1.0, lifeProgress = 1.0) {
      push();
      translate(machine.x, machine.y, machine.z);
      scale(machine.scale * params.boxSize);
      
      machine.rotX += machine.rotSpeedX * params.rotSpeed;
      machine.rotY += machine.rotSpeedY * params.rotSpeed;
      machine.rotZ += machine.rotSpeedZ * params.rotSpeed;
      
      rotateX(machine.rotX);
      rotateY(machine.rotY);
      rotateZ(machine.rotZ);
      
      // Core - fade in with machineFade
      for (let i = 0; i < 8; i++) {
        const alpha = map(i, 0, 7, params.alphaMax, params.alphaMin) * machineFade;
        const coreHue = (machine.hue + t * 0.2 * params.breathSpeed) % 360;
        
        fill(coreHue, params.saturation, params.brightness, alpha);
        noStroke();
        
        push();
        scale(1 + i * 0.15);
        box(60);
        pop();
      }
      
      // Components - each component appears progressively
      const totalComponents = machine.components.length;
      for (let idx = 0; idx < totalComponents; idx++) {
        const comp = machine.components[idx];
        
        // Calculate when this component should appear within this machine's lifetime
        const componentStartFade = idx / totalComponents;
        const componentEndFade = (idx + 1) / totalComponents;
        
        // Only draw if machine has faded in enough for this component
        if (machineFade > componentStartFade) {
          const componentFade = Math.min((machineFade - componentStartFade) / (componentEndFade - componentStartFade), 1.0);
          
          push();
          translate(comp.x, comp.y, comp.z);
          
          const r = t * comp.rotSpeed * params.rotSpeed + comp.phase;
          rotateX(r);
          rotateY(r * 0.7);
          rotateZ(r * 1.3);
          
          for (let i = 0; i < 5; i++) {
            const alpha = map(i, 0, 4, params.alphaMax * 0.8, params.alphaMin) * componentFade;
            const compHue = (machine.hue + 60 + t * 0.3 * params.breathSpeed + comp.phase * 10) % 360;
            
            fill(compHue, params.saturation - i * 5, params.brightness - i * 4, alpha);
            noStroke();
            
            const size = comp.size + i * 3;
            push();
            scale(1 + i * 0.1);
            
            if (comp.type === 0) {
              rotateX(HALF_PI);
              cylinder(size * 0.6, size);
            } else if (comp.type === 1) {
              box(size);
            } else if (comp.type === 2) {
              torus(size, size * 0.3);
            } else {
              sphere(size * 0.7);
            }
            pop();
          }
          
          stroke(machine.hue, 40, 70, params.alphaMax * 0.5 * componentFade);
          strokeWeight(2);
          line(0, 0, 0, -comp.x * 0.3, -comp.y * 0.3, -comp.z * 0.3);
          
          pop();
        }
      }
      
      pop();
    }
    
    function drawParticles(t, lifeProgress = 1.0) {
      for (let i = dnaState.particles.length - 1; i >= 0; i--) {
        const p = dnaState.particles[i];
        
        push();
        translate(p.x, p.y, p.z);
        fill(p.hue, params.saturation * 0.6, params.brightness * 0.9, (p.life / 255) * params.alphaMax * lifeProgress);
        noStroke();
        sphere(p.size * params.boxSize * 0.5);
        pop();
        
        p.x += p.vx * params.breathSpeed;
        p.y += p.vy * params.breathSpeed;
        p.z += p.vz * params.breathSpeed;
        p.life -= 0.5;
        
        if (p.life <= 0) {
          p.x = seededRandom.random() * 1600 - 800;
          p.y = seededRandom.random() * 1200 - 600;
          p.z = seededRandom.random() * 1600 - 800;
          p.vx = seededRandom.random() - 0.5;
          p.vy = seededRandom.random() - 0.5;
          p.vz = seededRandom.random() - 0.5;
          p.life = seededRandom.random() * 155 + 100;
          p.hue = seededRandom.random() * 80 + 280;
        }
      }
    }
    
    // NOTE: windowResized() intentionally removed for exhibition
    // The canvas size is fixed at 2160 x 3840 per exhibition requirements
  </script>
