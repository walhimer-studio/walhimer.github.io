<!DOCTYPE html>
<html>
<head>
    <title>3JS Smooth Forward</title>
    <style>
        body { margin: 0; overflow: hidden; background: white; }
    </style>
</head>
<body>
    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>
    <script type="module">
        import * as THREE from 'three';

        // --- 1. CONFIG FROM P5 ---
        const ROWS = 15;
        const SPACING = 175;
        const PALETTE = [310, 45, 30, 210, 270];
        let camZ = 2000;
        let targetCamZ = 2000;
        const camSpeed = 0.5;
        let frameCount = 0;

        // --- 2. THE SHADER (Vertical Gradient + 3D Shading) ---
        const vertexShader = `
            varying vec3 vNormal;
            varying float vY; // We pass the local Y position for the gradient
            void main() {
                vNormal = normalize(normalMatrix * normal);
                vY = position.y; // Local position (-0.5 to 0.5)
                gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
            }
        `;

        const fragmentShader = `
            varying vec3 vNormal;
            varying float vY;
            uniform vec3 uColor1; // HSB 1
            uniform vec3 uColor2; // HSB 2
            uniform float uAlpha;
            uniform vec3 uLightDir;

            vec3 hsb2rgb(vec3 c) {
                vec4 K = vec4(1.0, 2.0 / 3.0, 1.0 / 3.0, 3.0);
                vec3 p = abs(fract(c.xxx + K.xyz) * 6.0 - K.www);
                return c.z * mix(K.xxx, clamp(p - K.xxx, 0.0, 1.0), c.y);
            }

            void main() {
                // Map vY from (-0.5, 0.5) to (0.0, 1.0) for the gradient
                float inter = vY + 0.5;
                float hue = mix(uColor1.x, uColor2.x, inter) / 360.0;
                vec3 baseColor = hsb2rgb(vec3(hue, uColor1.y/100.0, uColor1.z/100.0));

                // 3D Depth Lighting (Lambertian)
                vec3 lightDir = normalize(uLightDir);
                float shading = max(dot(vNormal, lightDir), 0.0);
                // Mix ambient light (0.4) with directional light to show depth on box sides
                vec3 finalColor = baseColor * (0.4 + shading * 0.6);

                gl_Color = vec4(finalColor, uAlpha);
                gl_FragColor = vec4(finalColor, uAlpha);
            }
        `;

        // --- 3. SCENE SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(1, 1, 1);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 5000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // 4 is overkill for most GPUs, 2 is very sharp
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // --- 4. CITY GENERATION ---
        const city = [];
        const boxGeo = new THREE.BoxGeometry(1, 1, 1);

        for (let z = -ROWS / 2; z < ROWS / 2; z++) {
            const h1 = PALETTE[Math.floor(Math.random() * PALETTE.length)];
            const h2 = PALETTE[Math.floor(Math.random() * PALETTE.length)];
            const sat = Math.random() * 20 + 80;
            const bri = Math.random() * 20 + 80;

            const mat = new THREE.ShaderMaterial({
                uniforms: {
                    uColor1: { value: new THREE.Vector3(h1, sat, bri) },
                    uColor2: { value: new THREE.Vector3(h2, sat, bri) },
                    uAlpha: { value: 1.0 },
                    uLightDir: { value: new THREE.Vector3(0, 1, 0) }
                },
                vertexShader,
                fragmentShader,
                transparent: true
            });

            const mesh = new THREE.Mesh(boxGeo, mat);
            scene.add(mesh);

            city.push({
                mesh,
                zPos: z * SPACING,
                w: Math.random() * 200 + 200,
                h: Math.random() * 300 + 300,
                d: Math.random() * 200 + 200,
                pulseSpeed: Math.random() * 0.02 + 0.01,
                pulseOffset: Math.random() * Math.PI * 2
            });
        }

        // --- 5. SMOOTH ANIMATION LOOP ---
        function animate() {
            requestAnimationFrame(animate);
            frameCount++; // Incremented every frame for p5 math consistency

            // Movement logic: Exact mirror of forward.txt
            targetCamZ -= camSpeed;
            camZ = camZ + (targetCamZ - camZ) * 0.05; // Smooth Lerp
            
            const camX = Math.sin(frameCount * 0.005) * 50;
            const camY = 50;
            const camTargetZ = camZ - 100;

            camera.position.set(camX, camY, camZ);
            camera.lookAt(0, camY, camTargetZ);

            // Light Direction Logic (ensures box faces have different shades)
            const lightX = Math.sin(frameCount * 0.01);
            const lightZ = Math.cos(frameCount * 0.01);
            const lightDir = new THREE.Vector3(lightX, 1, lightZ);

            city.forEach(b => {
                const distanceToCam = Math.abs(b.zPos - camZ);
                
                // Opacity Mapping (0 to 1 range)
                let alpha = 1.0 - (distanceToCam / 1000);
                alpha = Math.max(0, Math.min(1, alpha));
                b.mesh.material.uniforms.uAlpha.value = alpha;
                b.mesh.material.uniforms.uLightDir.value = lightDir;

                // Pulsing Logic
                const pulse = 1 + 0.05 * Math.sin(frameCount * b.pulseSpeed + b.pulseOffset);
                const currentH = b.h * pulse;
                
                // p5: baseY = max(160 - h / 2, 0)
                const baseY = Math.max(160 - currentH / 2, 0);

                b.mesh.scale.set(b.w, currentH, b.d);
                b.mesh.position.set(0, baseY, b.zPos);
            });

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
