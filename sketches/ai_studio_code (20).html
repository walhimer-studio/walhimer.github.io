<html lang="en">
<head>

    <meta charset="UTF-8">
    <title>3JS Forward - Final Reconstruction</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        canvas { display: block; }
    </style>
    <!-- Load Three.js from a reliable CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
</head>
<body>
    <script>
        // --- 1. SETTINGS FROM FORWARD.TXT ---
        const ROWS = 15;
        const SPACING = 175;
        const PALETTE = [310, 45, 30, 210, 270];
        let camZ = 2000;
        let targetCamZ = 2000;
        const camSpeed = 0.5;
        let frameCount = 0;
        const city = [];

        // --- 2. THE SHADER (Handles HSB Gradients + Transparency + 3D Volume) ---
        const vertexShader = `
            varying vec2 vUv;
            varying vec3 vNormal;
            void main() {
                vUv = uv;
                // Get the normal for 3D depth shading
                vNormal = normalize(normalMatrix * normal);
                gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
            }
        `;

        const fragmentShader = `
            varying vec2 vUv;
            varying vec3 vNormal;
            uniform vec3 uColor1; // HSB: Hue, Sat, Bri
            uniform vec3 uColor2;
            uniform float uAlpha;
            uniform vec3 uLightDir;

            // Accurate HSB to RGB conversion to match p5 vibrancy
            vec3 hsb2rgb(vec3 c) {
                vec4 K = vec4(1.0, 2.0 / 3.0, 1.0 / 3.0, 3.0);
                vec3 p = abs(fract(c.xxx + K.xyz) * 6.0 - K.www);
                return c.z * mix(K.xxx, clamp(p - K.xxx, 0.0, 1.0), c.y);
            }

            void main() {
                // p5 Gradient Logic: lerp colors from bottom to top
                float hue = mix(uColor1.x, uColor2.x, vUv.y) / 360.0;
                float sat = uColor1.y / 100.0;
                float bri = uColor1.z / 100.0;
                
                vec3 rgb = hsb2rgb(vec3(hue, sat, bri));

                // 3D Depth Logic (Lambert Shading)
                // This prevents the "flat plane" look by shading sides differently
                vec3 lightDir = normalize(uLightDir);
                float diff = max(dot(vNormal, lightDir), 0.0);
                
                // ambientLight(100) is approx 0.4 intensity
                vec3 finalColor = rgb * (0.4 + diff * 0.6);

                gl_FragColor = vec4(finalColor, uAlpha);
            }
        `;

        // --- 3. SCENE INITIALIZATION ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xffffff); // p5: background(0,0,100)

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 10000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // --- 4. BUILDING CREATION ---
        const boxGeometry = new THREE.BoxGeometry(1, 1, 1);

        for (let z = -ROWS / 2; z < ROWS / 2; z++) {
            const h1 = PALETTE[Math.floor(Math.random() * PALETTE.length)];
            const h2 = PALETTE[Math.floor(Math.random() * PALETTE.length)];
            const sat = Math.random() * 20 + 80; // random(80, 100)
            const bri = Math.random() * 20 + 80; // random(80, 100)

            const shaderMaterial = new THREE.ShaderMaterial({
                uniforms: {
                    uColor1: { value: new THREE.Vector3(h1, sat, bri) },
                    uColor2: { value: new THREE.Vector3(h2, sat, bri) },
                    uAlpha: { value: 1.0 },
                    uLightDir: { value: new THREE.Vector3(0, 1, 1) }
                },
                vertexShader: vertexShader,
                fragmentShader: fragmentShader,
                transparent: true,
                depthWrite: false, // Helps with transparency overlapping
                blending: THREE.NormalBlending
            });

            const mesh = new THREE.Mesh(boxGeometry, shaderMaterial);
            scene.add(mesh);

            city.push({
                mesh: mesh,
                zPos: z * SPACING,
                w: Math.random() * 200 + 200,
                h: Math.random() * 300 + 300,
                d: Math.random() * 200 + 200,
                pulseSpeed: Math.random() * 0.02 + 0.01,
                pulseOffset: Math.random() * (Math.PI * 2)
            });
        }

        // --- 5. THE DRAW LOOP (Smooth Frame-by-Frame) ---
        function draw() {
            requestAnimationFrame(draw);
            frameCount++;

            // Camera movement logic mirroring forward.txt
            targetCamZ -= camSpeed;
            camZ = camZ + (targetCamZ - camZ) * 0.05; // lerp(camZ, targetCamZ, 0.05)
            
            const camX = Math.sin(frameCount * 0.005) * 50;
            const camY = 50;
            camera.position.set(camX, camY, camZ);
            camera.lookAt(0, camY, camZ - 100);

            // Shifting light direction to define box corners during movement
            const lightDir = new THREE.Vector3(Math.sin(frameCount * 0.01), 1, Math.cos(frameCount * 0.01));

            city.forEach(b => {
                // Pulse Logic
                const pulse = 1 + 0.05 * Math.sin(frameCount * b.pulseSpeed + b.pulseOffset);
                const currentH = b.h * pulse;
                
                // p5: baseY = max(160 - h / 2, 0)
                const baseY = Math.max(160 - currentH / 2, 0);

                // Apply Transformations
                b.mesh.scale.set(b.w, currentH, b.d);
                b.mesh.position.set(0, baseY, b.zPos);

                // Translucency distance mapping: map(dist, 0, 1000, 255, 0)
                const distanceToCam = Math.abs(b.zPos - camZ);
                let alpha = 1.0 - (distanceToCam / 1000);
                alpha = Math.max(0, Math.min(1, alpha));

                // Update Shader Uniforms
                b.mesh.material.uniforms.uAlpha.value = alpha;
                b.mesh.material.uniforms.uLightDir.value = lightDir;
            });

            renderer.render(scene, camera);
        }

        // Handle window resizing
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        draw();
    </script>
</body>
</html>
