<script>
/* ============================================================
   un-grounded — Mark Walhimer
   Transient Labs blind mint (20 editions)
   Half “grounded” (floor static), half “un-grounded” (floating)
   ============================================================ */

// --------- PARAMETERS (locked per mint) ----------
const params = {
  grounded: Math.random() < 0.5,        // 50% grounded / un-grounded
  colorSeed: Math.random(),             // hue seed variation
  boxScale: 0.8 + Math.random() * 0.4,  // size variation
};

// --------- GLOBAL VARIABLES ----------
let city = [];
let rows = 15;
let spacing = 175;
let palette = [310, 45, 30, 210, 270];

let camZ = 2000;
let targetCamZ = 2000;
let camSpeed = 0.5;

let gradientTextures = [];
let staticTexture;

// --------- UTILITY: deterministic random ---------
function seededRandom(seed) {
  const x = Math.sin(seed * 10000) * 10000;
  return x - Math.floor(x);
}

// --------- SETUP ----------
function setup() {
  createCanvas(windowWidth, windowHeight, WEBGL);
  pixelDensity(2);
  frameRate(60);
  colorMode(HSB, 360, 100, 100, 255);
  noStroke();
  setAttributes('alpha', true);

  // Seed randomness with colorSeed
  randomSeed(params.colorSeed * 1e6);
  noiseSeed(params.colorSeed * 1e6);

  // Pre-generate gradient textures
  for (let i = 0; i < 10; i++) {
    let hue1 = random(palette);
    let hue2 = random(palette);
    let sat = random(80, 100);
    let bri = random(80, 100);
    let tex = createGraphics(64, 256);
    tex.colorMode(HSB, 360, 100, 100, 255);
    for (let y = 0; y < tex.height; y++) {
      let inter = map(y, 0, tex.height, 0, 1);
      let hBlend = lerp(hue1, hue2, inter);
      tex.stroke(hBlend, sat, bri, 255);
      tex.line(0, y, tex.width, y);
    }
    gradientTextures.push(tex);
  }

  // Build city blocks
  for (let z = -rows / 2; z < rows / 2; z++) {
    let w = random(200, 400) * params.boxScale;
    let d = random(200, 400) * params.boxScale;
    let h = random(300, 600) * params.boxScale;
    let pulseSpeed = random(0.01, 0.03);
    let pulseOffset = random(TWO_PI);
    let tex = random(gradientTextures);
    city.push({ x: 0, z: z * spacing, w, h, d, tex, pulseSpeed, pulseOffset });
  }

  // Precompute static texture for grounded cases
  staticTexture = createGraphics(256, 256);
  staticTexture.loadPixels();
  for (let i = 0; i < staticTexture.width * staticTexture.height * 4; i += 4) {
    const noiseVal = random(180, 255);
    staticTexture.pixels[i] = noiseVal;
    staticTexture.pixels[i + 1] = noiseVal;
    staticTexture.pixels[i + 2] = noiseVal;
    staticTexture.pixels[i + 3] = 255;
  }
  staticTexture.updatePixels();
}

// --------- DRAW ----------
function draw() {
  background(0, 0, 100);

  // Move camera forward
  targetCamZ -= camSpeed;
  camZ = lerp(camZ, targetCamZ, 0.05);

  // Subtle camera drift
  let camX = sin(frameCount * 0.005) * 50;
  let camY = 50;
  let camTargetZ = camZ - 100;
  camera(camX, camY, camZ, 0, camY, camTargetZ, 0, 1, 0);

  // Lighting
  ambientLight(100);
  directionalLight(255, 255, 255, sin(frameCount * 0.01), -1, cos(frameCount * 0.01));

  // Grounded option: draw floor plane with static
  if (params.grounded) {
    push();
    rotateX(HALF_PI);
    translate(0, 0, -0.5);
    texture(staticTexture);
    plane(width * 4, height * 4);
    pop();
  }

  // Draw city blocks
  for (let b of city) {
    let distanceToCam = abs(b.z - camZ);
    let alpha = map(distanceToCam, 0, 1000, 255, 0, true);

    let pulse = 1 + 0.05 * sin(frameCount * b.pulseSpeed + b.pulseOffset);
    let h = b.h * pulse;

    push();
    translate(b.x, (params.grounded ? -h / 2 : 160 - h / 2), b.z);
    texture(b.tex);
    tint(255, alpha);
    box(b.w, h, b.d);
    pop();
  }
}

// --------- RESPONSIVE CANVAS ----------
function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}
</script>
</body>
