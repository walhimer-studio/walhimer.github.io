<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Vivid Gradient Boxes – Inside View</title>
  <style>
    body { margin: 0; overflow: hidden; background: white; }
  </style>
</head>
<body>
  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
  <script>
    let scene, camera, renderer;
    let objects = [];

    const vividColors = [
      [0xff00cc, 0xffaaff], // vivid pink gradient
      [0x9900ff, 0xcc99ff], // vivid purple gradient
      [0xffff00, 0xffcc00], // vivid yellow gradient
      [0xff6600, 0xff9966], // vivid orange gradient
      [0x3399ff, 0x00ccff], // vivid blue gradient
    ];

    function init() {
      // Setup scene and camera
      scene = new THREE.Scene();
      camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 1, 10000);
      camera.position.set(0, 0, 0); // Camera is inside the structure

      renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      document.body.appendChild(renderer.domElement);

      // Lighting for glow and gradient fade
      const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
      const directionalLight = new THREE.DirectionalLight(0xffffff, 0.6);
      directionalLight.position.set(1, 1, 1);
      scene.add(ambientLight, directionalLight);

      // Create large gradient translucent boxes around the camera
      for (let i = 0; i < 7; i++) {
        const w = Math.random() * 2000 + 1500;
        const h = Math.random() * 2000 + 1500;
        const d = Math.random() * 2000 + 1500;

        const [color1, color2] = vividColors[Math.floor(Math.random() * vividColors.length)];

        // Create gradient material using vertex colors
        const geometry = new THREE.BoxGeometry(w, h, d);
        const colors = [];
        for (let j = 0; j < geometry.attributes.position.count; j++) {
          const lerp = j % 2 === 0 ? 0 : 1;
          const c = new THREE.Color().setHex(lerp ? color2 : color1);
          colors.push(c.r, c.g, c.b);
        }
        geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));

        const material = new THREE.MeshPhongMaterial({
          vertexColors: true,
          transparent: true,
          opacity: 0.2,
          side: THREE.BackSide, // Invert to view from inside
        });

        const mesh = new THREE.Mesh(geometry, material);
        mesh.position.set(
          Math.random() * 1000 - 500,
          Math.random() * 1000 - 500,
          Math.random() * 1000 - 500
        );
        mesh.userData.fadeOffset = Math.random() * Math.PI * 2;
        scene.add(mesh);
        objects.push(mesh);
      }

      window.addEventListener('resize', onWindowResize);
    }

    function animate(time) {
      requestAnimationFrame(animate);

      const t = time * 0.001;

      // Subtle scene rotation to simulate immersion
      scene.rotation.y = t * 0.05;
      scene.rotation.x = Math.sin(t * 0.2) * 0.05;

      // Modulate box opacities with sin wave
      objects.forEach(obj => {
        const fade = Math.sin(t + obj.userData.fadeOffset);
        obj.material.opacity = THREE.MathUtils.mapLinear(fade, -1, 1, 0.05, 0.25);
      });

      renderer.render(scene, camera);
    }

    function onWindowResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    init();
    animate();
  </script>
</body>
</html>
