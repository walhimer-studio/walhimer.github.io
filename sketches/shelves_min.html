<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Sliders Proof (2D)</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    body{margin:0;display:flex;flex-direction:column;align-items:center;background:#fff;font-family:system-ui,Arial,sans-serif}
    #sliders{display:flex;gap:12px;margin:12px 0}
    input[type=range]{width:200px}
    #debug{margin:8px 0;font-size:14px}
    canvas{border:1px solid #ccc;margin-top:8px}
  </style>
</head>
<body>
  <div id="sliders">
    <label>m0 <input type="range" id="m0" min="0" max="1" step="0.001" value="0.5"></label>
    <label>m1 <input type="range" id="m1" min="0" max="1" step="0.001" value="0.5"></label>
  </div>
  <div id="debug">m0=0.5, m1=0.5</div>
  <main id="canvas-container"></main>
  <script>
    let m0=0.5, m1=0.5;
    function setup(){
      const cnv=createCanvas(500,220); cnv.parent("canvas-container");
      noLoop(); redraw();
    }
    function draw(){ drawArt(); }
    function drawArt(){
      background(250);
      // A big bar whose width depends on m0 and color depends on m1 — obvious visual change
      const w = map(m0,0,1,20,width-20);
      const hue = map(m1,0,1,0,360);
      colorMode(HSB,360,100,100);
      fill(hue,90,90);
      rect(10,60,w,100);
      // Numeric readout on canvas too
      fill(0); colorMode(RGB);
      textSize(16); textAlign(LEFT,TOP);
      text('m0='+nf(m0,1,3)+'  m1='+nf(m1,1,3),10,10);
    }
    function updateAndRedraw(){
      document.getElementById('debug').textContent = `m0=${m0.toFixed(3)}, m1=${m1.toFixed(3)}`;
      redraw();
    }
    document.getElementById('m0').addEventListener('input',e=>{ m0=parseFloat(e.target.value); updateAndRedraw(); });
    document.getElementById('m1').addEventListener('input',e=>{ m1=parseFloat(e.target.value); updateAndRedraw(); });
  </script>
</body>
</html>
