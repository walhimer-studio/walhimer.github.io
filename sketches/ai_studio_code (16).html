<!DOCTYPE html>
<html>
<head>
    <title>3JS Port - Forward</title>
    <style>
        body { margin: 0; overflow: hidden; background: white; }
        canvas { display: block; }
    </style>
</head>
<body>
    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>
    <script type="module">
        import * as THREE from 'three';

        // 1. DATA FROM FORWARD.TXT
        const ROWS = 15;
        const SPACING = 175;
        const PALETTE = [310, 45, 30, 210, 270];
        let camZ = 2000;
        let targetCamZ = 2000;
        const camSpeed = 0.5;
        let frameCount = 0;

        // 2. SHADERS (HSB Colors + p5-style Directional Lighting)
        const vertexShader = `
            varying vec2 vUv;
            varying vec3 vNormal;
            varying vec3 vViewPosition;
            void main() {
                vUv = uv;
                vNormal = normalize(normalMatrix * normal);
                vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                vViewPosition = -mvPosition.xyz;
                gl_Position = projectionMatrix * mvPosition;
            }
        `;

        const fragmentShader = `
            varying vec2 vUv;
            varying vec3 vNormal;
            uniform vec3 uColor1; 
            uniform vec3 uColor2;
            uniform float uAlpha;
            uniform vec3 uLightDir;

            vec3 hsb2rgb(vec3 c) {
                vec4 K = vec4(1.0, 2.0 / 3.0, 1.0 / 3.0, 3.0);
                vec3 p = abs(fract(c.xxx + K.xyz) * 6.0 - K.www);
                return c.z * mix(K.xxx, clamp(p - K.xxx, 0.0, 1.0), c.y);
            }

            void main() {
                // HSB Gradient Calculation
                float hue = mix(uColor1.x, uColor2.x, vUv.y) / 360.0;
                vec3 baseColor = hsb2rgb(vec3(hue, uColor1.y/100.0, uColor1.z/100.0));

                // Shading (Matches p5 ambientLight + directionalLight)
                float ambient = 0.4; // ambientLight(100) -> 100/255 approx 0.4
                vec3 lightDir = normalize(uLightDir);
                float dotProduct = max(dot(vNormal, lightDir), 0.0);
                vec3 finalColor = baseColor * (ambient + dotProduct);

                gl_FragColor = vec4(finalColor, uAlpha);
            }
        `;

        // 3. SCENE SETUP
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(1, 1, 1); // background(0,0,100)

        const camera = new THREE.PerspectiveCamera(45, 1536 / 864, 1, 5000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(4); // pixelDensity(4)
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 4. BUILDING CREATION
        const city = [];
        const boxGeo = new THREE.BoxGeometry(1, 1, 1);

        for (let z = -ROWS / 2; z < ROWS / 2; z++) {
            const h1 = PALETTE[Math.floor(Math.random() * PALETTE.length)];
            const h2 = PALETTE[Math.floor(Math.random() * PALETTE.length)];
            const sat = Math.random() * 20 + 80;
            const bri = Math.random() * 20 + 80;

            const mat = new THREE.ShaderMaterial({
                uniforms: {
                    uColor1: { value: new THREE.Vector3(h1, sat, bri) },
                    uColor2: { value: new THREE.Vector3(h2, sat, bri) },
                    uAlpha: { value: 1.0 },
                    uLightDir: { value: new THREE.Vector3(0, 1, 0) }
                },
                vertexShader,
                fragmentShader,
                transparent: true,
                side: THREE.FrontSide
            });

            const mesh = new THREE.Mesh(boxGeo, mat);
            scene.add(mesh);

            city.push({
                mesh,
                x: 0,
                zPos: z * SPACING,
                w: Math.random() * 200 + 200,
                h: Math.random() * 300 + 300,
                d: Math.random() * 200 + 200,
                pulseSpeed: Math.random() * 0.02 + 0.01,
                pulseOffset: Math.random() * Math.PI * 2
            });
        }

        // 5. ANIMATION LOOP (Matching p5 logic exactly)
        function animate() {
            requestAnimationFrame(animate);
            frameCount++;

            // Camera movement math from forward.txt
            targetCamZ -= camSpeed;
            camZ = camZ + (targetCamZ - camZ) * 0.05; // lerp logic
            
            let camX = Math.sin(frameCount * 0.005) * 50;
            let camY = 50;
            let camTargetZ = camZ - 100;

            camera.position.set(camX, camY, camZ);
            camera.lookAt(0, camY, camTargetZ);

            // Light movement math from forward.txt
            let lightX = Math.sin(frameCount * 0.01);
            let lightZ = Math.cos(frameCount * 0.01);
            let lightDir = new THREE.Vector3(lightX, 1, lightZ); // -1 in p5 is up in 3JS

            city.forEach(b => {
                // Pulse height
                let pulse = 1 + 0.05 * Math.sin(frameCount * b.pulseSpeed + b.pulseOffset);
                let currentH = b.h * pulse;
                
                // Position logic: baseY = max(160 - h / 2, 0)
                let baseY = Math.max(160 - currentH / 2, 0);

                // Update Mesh
                b.mesh.scale.set(b.w, currentH, b.d);
                b.mesh.position.set(b.x, baseY, b.zPos);

                // Alpha distance mapping
                let distanceToCam = Math.abs(b.zPos - camZ);
                let alpha = 1.0 - (distanceToCam / 1000); // p5 map(dist, 0, 1000, 255, 0)
                
                // Update Material Uniforms
                b.mesh.material.uniforms.uAlpha.value = Math.max(0, Math.min(1, alpha));
                b.mesh.material.uniforms.uLightDir.value = lightDir;
            });

            renderer.render(scene, camera);
        }

        // Handle Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
