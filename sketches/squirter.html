<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>p5.js WEBGL — Closed Loop Belt captured by Wheel Groove + Large Fender</title>
  <!-- p5.js core (includes WEBGL) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
</head>
<body>
  <script>
    // p5.js WEBGL — Closed Loop Belt captured by Wheel Groove + Large Fender
    // Robust contact (index-based patch), no reversal, anti-aliasing “backwards” illusion fix

    // ---------------- Config ----------------
    const NUM_LINKS = 620;            // many points = smooth inextensible loop
    const WHEEL_RADIUS = 120;

    // Groove corridor (top arc only)
    const GROOVE_HALF   = 8;          // half-width of groove on wheel body (inner wall = R-GROOVE_HALF)
    const FENDER_CLEAR  = 7;          // clearance from wheel radius to fender inner wall
    const FENDER_THICK  = 28;         // visual thickness of fender band
    const FENDER_ARC    = Math.PI * 0.95; // big coverage (~171°)

    // Hanging loop geometry (racetrack U under the wheel; width = wheel diameter)
    const HANG_DEPTH    = 380;        // how far the loop dips below the wheel
    const BOTTOM_ARC_RX = WHEEL_RADIUS; // bottom half-ellipse width aligns with wheel
    const BOTTOM_ARC_RY = 170;        // bottom curvature

    // Physics feel (ultra-light belt)
    const GRAVITY       = 0.00028;
    const DAMPING       = 0.999;
    const SOLVER_ITERS  = 10;         // more iterations = tighter inextensibility
    const SUBSTEPS      = 2;          // integrate twice per frame for stability

    // Contact/drive (on the top arc only)
    const TOP_ARC_MIN   = Math.PI * 0.50;     // min contact at slow speed
    const TOP_ARC_MAX   = Math.PI * 0.90;     // max contact at high speed (clamped to fender)
    const CONTACT_RESP  = 0.18;               // how quickly contact angle grows/shrinks
    const CAPTURE_PULL  = 0.34;               // pull toward wheel radius for contact links
    const RADIAL_DAMP   = 0.30;               // radial velocity removal in contact
    const TANGENTIAL_COUPLE = 0.20;           // frictional coupling along tangent (gentle)

    // Wheel (forward-only) dynamics
    const SPEED_EASE    = 0.16;       // target → wheelOmega easing
    const COAST_DRAG    = 0.985;      // coast-down when target=0

    // ---------------- State ----------------
    let links = [];                   // [{pos: p5.Vector, vel: p5.Vector}]
    let linkLen = 4;                  // computed
    let wheelAngle = 0;
    let wheelOmega = 0;               // rad/frame
    let speedSlider;

    // Index-based contact window that ADVECTS with the wheel (no “guessing by angle”)
    let contactStart = 0;             // index of first link on the top arc
    let contactCount = 0;             // how many links currently in contact
    let contactCarry = 0;             // arc-distance residue (px) → next frame
    let contactAngle = TOP_ARC_MIN;   // smoothed contact size (rad)

    // ---------------- Helpers ----------------
    function ellipsePerimeterRam(a, b) {
      return Math.PI * (3 * (a + b) - Math.sqrt((3 * a + b) * (a + 3 * b)));
    }
    function clamp(v, a, b) { return Math.max(a, Math.min(b, v)); }

    // Visual helpers
    function drawRingBand(rIn, rOut, z = 0, col = [40,40,40,255]) {
      push(); translate(0,0,z); noStroke(); fill(...col);
      beginShape(TRIANGLE_STRIP);
      for (let a = 0; a <= Math.PI*2 + 0.0001; a += 0.05) {
        vertex(rIn * Math.cos(a), rIn * Math.sin(a), 0);
        vertex(rOut * Math.cos(a), rOut * Math.sin(a), 0);
      }
      endShape(); pop();
    }
    function drawFenderBand(rIn, rOut, arcAngle) {
      const a0 = -Math.PI/2 - arcAngle/2, a1 = -Math.PI/2 + arcAngle/2;
      noStroke(); fill(90,90,90,210);
      beginShape(TRIANGLE_STRIP);
      for (let a = a0; a <= a1 + 0.0001; a += 0.05) {
        vertex(rIn * Math.cos(a), rIn * Math.sin(a), 0);
        vertex(rOut * Math.cos(a), rOut * Math.sin(a), 0);
      }
      endShape();
    }

    // ---------------- Setup ----------------
    function setup() {
      createCanvas(1000, 1000, WEBGL);
      frameRate(60);

      createP("Wheel speed").style('margin:8px 0 2px 0');
      speedSlider = createSlider(0, 100, 0, 1);

      // Build racetrack loop: Top arc → Right vertical → Bottom half-ellipse → Left vertical
      const initArc = Math.min(TOP_ARC_MIN, FENDER_ARC);
      const aMid = -Math.PI/2, a0 = aMid - initArc/2, a1 = aMid + initArc/2;

      const topArcLen = initArc * WHEEL_RADIUS;
      const rightVertTopY = WHEEL_RADIUS * Math.sin(a1);
      const leftVertTopY  = WHEEL_RADIUS * Math.sin(a0);
      const rightVertLen  = HANG_DEPTH - rightVertTopY;
      const leftVertLen   = HANG_DEPTH - leftVertTopY;
      const bottomHalfLen = 0.5 * ellipsePerimeterRam(BOTTOM_ARC_RX, BOTTOM_ARC_RY);
      const totalLen      = topArcLen + rightVertLen + bottomHalfLen + leftVertLen;

      linkLen = totalLen / NUM_LINKS;

      let nTop    = Math.max(14, Math.floor(topArcLen / linkLen));
      let nRight  = Math.max(12, Math.floor(rightVertLen / linkLen));
      let nBottom = Math.max(30, Math.floor(bottomHalfLen / linkLen));
      let nLeft   = NUM_LINKS - (nTop + nRight + nBottom);
      if (nLeft < 12) { nLeft = 12; nBottom = NUM_LINKS - (nTop + nRight + nLeft); }

      // 1) Top arc
      for (let i = 0; i < nTop; i++) {
        const u = (nTop === 1) ? 0.5 : i / (nTop - 1);
        const a = a0 + u * (a1 - a0);
        links.push({ pos: createVector(WHEEL_RADIUS * Math.cos(a), WHEEL_RADIUS * Math.sin(a), 0),
                     vel: createVector(0,0,0) });
      }
      // 2) Right vertical (x = +R)
      for (let i = 1; i <= nRight; i++) {
        const u = i / nRight;
        const y = rightVertTopY + u * (HANG_DEPTH - rightVertTopY);
        links.push({ pos: createVector(+WHEEL_RADIUS, y, 0), vel: createVector(0,0,0) });
      }
      // 3) Bottom half-ellipse (+R → -R)
      for (let i = 1; i <= nBottom; i++) {
        const u = i / nBottom, phi = u * Math.PI; // 0..PI
        const x = BOTTOM_ARC_RX * Math.cos(phi);
        const y = HANG_DEPTH + BOTTOM_ARC_RY * Math.sin(phi);
        links.push({ pos: createVector(x, y, 0), vel: createVector(0,0,0) });
      }
      // 4) Left vertical (x = -R)
      for (let i = 1; i <= nLeft; i++) {
        const u = i / nLeft;
        const y = HANG_DEPTH + (leftVertTopY - HANG_DEPTH) * u;
        links.push({ pos: createVector(-WHEEL_RADIUS, y, 0), vel: createVector(0,0,0) });
      }

      // Seed contact count from initial arc
      const topArcLen0 = initArc * WHEEL_RADIUS;
      contactCount = Math.max(8, Math.floor(topArcLen0 / linkLen));
    }

    // ---------------- Draw ----------------
    function draw() {
      background(255);
      // keep plan view; no rotateX — removing camera tilt helps perception
      // orbitControl(); // uncomment if you want to pan/zoom

      // ---------- Wheel omega (forward only) ----------
      const target = speedSlider.value() * 0.01; // 0..1
      const delta  = (target - wheelOmega) * SPEED_EASE;
      wheelOmega = Math.max(0, wheelOmega + delta); // never negative
      if (target === 0) wheelOmega = Math.max(0, wheelOmega * COAST_DRAG);
      wheelAngle += wheelOmega;

      // ---------- Dynamic contact size ----------
      const surfaceV = wheelOmega * WHEEL_RADIUS; // px/frame (non-negative)
      const vNorm    = clamp(surfaceV / (1.5 * linkLen), 0, 1);
      const targetAngle = Math.min(FENDER_ARC, TOP_ARC_MIN + (TOP_ARC_MAX - TOP_ARC_MIN) * vNorm);
      contactAngle += (targetAngle - contactAngle) * CONTACT_RESP;

      // How many links live on that arc (recompute each frame)
      const topArcLen = contactAngle * WHEEL_RADIUS;
      contactCount = Math.max(6, Math.floor(topArcLen / linkLen));

      // Slide the contact window forward by exact rim distance
      contactCarry += surfaceV;
      while (contactCarry >= linkLen) {
        contactStart = (contactStart + 1) % NUM_LINKS;
        contactCarry -= linkLen;
      }

      // Corridor walls
      const rInner = WHEEL_RADIUS - GROOVE_HALF;
      const rWheel = WHEEL_RADIUS;
      const rFend  = WHEEL_RADIUS + FENDER_CLEAR;

      // Contact arc angles (world top)
      const aMid = -Math.PI/2;
      const aMin = aMid - contactAngle/2;
      const aMax = aMid + contactAngle/2;

      // ---------- Sub-stepped physics for stability ----------
      for (let step = 0; step < SUBSTEPS; step++) {
        // Free integration
        for (const L of links) {
          L.vel.y += GRAVITY;
          L.pos.add(L.vel);
          L.vel.mult(DAMPING);
        }

        // Strong, index-based capture for just the contact links
        for (let i = 0; i < contactCount; i++) {
          const idx = (contactStart + i) % NUM_LINKS;
          const L = links[idx];

          // Position along the top arc from left→right
          const u = contactCount > 1 ? i / (contactCount - 1) : 0.5;
          const a = aMin + u * (aMax - aMin);

          // Ideal groove location on wheel radius
          const gx = rWheel * Math.cos(a);
          const gy = rWheel * Math.sin(a);

          // Pull toward groove centerline (not a teleport)
          L.pos.x += (gx - L.pos.x) * CAPTURE_PULL;
          L.pos.y += (gy - L.pos.y) * CAPTURE_PULL;

          // Clamp inside corridor
          const rx = L.pos.x, ry = L.pos.y;
          const rMag = Math.hypot(rx, ry) || 1;
          const nx = rx / rMag, ny = ry / rMag;

          if (rMag < rInner) {
            L.pos.x = nx * rInner; L.pos.y = ny * rInner;
          } else if (rMag > rFend) {
            L.pos.x = nx * rFend;  L.pos.y = ny * rFend;
          }

          // Reduce radial velocity
          const vRad = (L.vel.x * nx + L.vel.y * ny);
          L.vel.x -= nx * vRad * RADIAL_DAMP;
          L.vel.y -= ny * vRad * RADIAL_DAMP;

          // Tangential frictional drive (match wheel surface gently)
          const tx = -ny, ty = nx; // tangent
          const vLinkT  = L.vel.x * tx + L.vel.y * ty;
          const vWheelT = surfaceV; // wheel surface speed
          const dvT = (vWheelT - vLinkT) * TANGENTIAL_COUPLE;
          L.vel.x += tx * dvT;
          L.vel.y += ty * dvT;
        }

        // Inextensibility (closed loop) — constraint solver
        for (let iter = 0; iter < SOLVER_ITERS; iter++) {
          for (let i = 0; i < NUM_LINKS; i++) {
            const a = links[i];
            const b = links[(i + 1) % NUM_LINKS];
            const dx = b.pos.x - a.pos.x;
            const dy = b.pos.y - a.pos.y;
            const m  = Math.hypot(dx, dy);
            if (m === 0) continue;
            const diff = (m - linkLen) * 0.5;
            const nx = dx / m, ny = dy / m;
            a.pos.x += nx * diff; a.pos.y += ny * diff;
            b.pos.x -= nx * diff; b.pos.y -= ny * diff;
          }
        }
      }

      // ---------------- DRAW ----------------
      // Wheel body with visible groove (outer flange + recessed groove)
      push();
      rotateZ(wheelAngle); // spin in plane
      drawRingBand(WHEEL_RADIUS - (GROOVE_HALF + 6), WHEEL_RADIUS + (GROOVE_HALF + 6), 0, [32,32,32,255]);
      drawRingBand(WHEEL_RADIUS - GROOVE_HALF,      WHEEL_RADIUS + GROOVE_HALF,      1, [0,0,0,255]);

      // Add spokes + a rim marker dot to kill “backwards” wagon-wheel illusion
      stroke(220); strokeWeight(2);
      for (let k = 0; k < 6; k++) {
        const a = k * Math.PI/3;
        line(0,0, (WHEEL_RADIUS-8)*Math.cos(a), (WHEEL_RADIUS-8)*Math.sin(a));
      }
      noStroke(); fill(255,0,0);
      circle(WHEEL_RADIUS * 0.95, 0, 6); // marker dot at rim
      pop();

      // Large Fender (thick partial band) above wheel
      push();
      translate(0, 0, 4);
      const fIn  = WHEEL_RADIUS + FENDER_CLEAR;
      const fOut = fIn + FENDER_THICK;
      drawFenderBand(fIn, fOut, FENDER_ARC);
      pop();

      // Belt polyline (closed)
      stroke(0); strokeWeight(2); noFill();
      beginShape();
      for (const L of links) vertex(L.pos.x, L.pos.y, 0);
      endShape(CLOSE);

      // Optional: link dots
      noStroke(); fill(0);
      for (const L of links) { push(); translate(L.pos.x, L.pos.y, 0); sphere(3); pop(); }
    }
  </script>
</body>
</html>
