<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Inside One Vivid Pink Fading Box</title>
  <style>
    body { margin: 0; overflow: hidden; background: black; }
  </style>
</head>
<body>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script>
let scene, camera, renderer, box;
let fadeOffset = Math.random() * Math.PI * 2;
let opacityCurrent = 0.2;

function init() {
  // Scene and camera
  scene = new THREE.Scene();
  camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 1, 5000);
  camera.position.set(0, 0, 0); // Inside the box

  // Renderer
  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  // Lighting
  const light = new THREE.AmbientLight(0xffffff, 1);
  scene.add(light);

  // Geometry
  const geometry = new THREE.BoxGeometry(2000, 2000, 2000);
  const material = new THREE.MeshBasicMaterial({
    color: 0xff00cc,         // vivid pink
    transparent: true,
    opacity: opacityCurrent,
    side: THREE.BackSide,    // so you're inside
    depthWrite: false
  });

  box = new THREE.Mesh(geometry, material);
  scene.add(box);

  window.addEventListener('resize', onWindowResize);
}

function animate(time) {
  requestAnimationFrame(animate);
  const t = time * 0.001;

  // Fade in/out with sin wave
  const target = THREE.MathUtils.mapLinear(Math.sin(t + fadeOffset), -1, 1, 0.05, 0.3);
  opacityCurrent = THREE.MathUtils.lerp(opacityCurrent, target, 0.05);
  box.material.opacity = opacityCurrent;

  renderer.render(scene, camera);
}

function onWindowResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}

init();
animate();
</script>
</body>
</html>
