<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Miradas Tangentes - Mark Walhimer</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
    }
    canvas {
      max-height: 100vh;
      max-width: 100vw;
    }
  </style>
</head>
<body>
  <script>
// MIRADAS TANGENTES - Two Paired Organisms
// Mark Walhimer - Siroco ArtLab, Madrid
// February 13, 2025
//
// Two organisms that take turns on one screen
// Each 3 minutes, seamless loop
// Colorful but not garish - saturated translucent layers

let currentOrganism = 0; // 0 or 1
let cycleStartTime;
const CYCLE_DURATION = 180000; // 3 minutes per organism
const FADE_DURATION = 3000;    // 3 second crossfade

// Organism A - Warm family (reds, oranges, magentas, golds)
// Organism B - Cool family (cyans, blues, teals, violets)

let organismsA = [];
let organismsB = [];

// Color palettes - saturated but translucent
let paletteA, paletteB;

function setup() {
  // Vertical format for exhibition: 1080x1920 (scale of 2160x3840)
  createCanvas(1080, 1920, WEBGL);
  pixelDensity(1);
  frameRate(30);
  noStroke();
  
  cycleStartTime = millis();
  
  // Warm palette - organism A
  paletteA = [
    [255, 70, 90],    // Coral red
    [255, 140, 50],   // Orange
    [255, 200, 80],   // Gold
    [255, 90, 150],   // Hot pink
    [200, 60, 100]    // Deep rose
  ];
  
  // Cool palette - organism B  
  paletteB = [
    [60, 200, 255],   // Cyan
    [100, 120, 255],  // Periwinkle blue
    [150, 80, 255],   // Violet
    [80, 255, 200],   // Teal
    [100, 180, 220]   // Sky blue
  ];
  
  initOrganismA();
  initOrganismB();
}

function initOrganismA() {
  organismsA = [];
  // Organism A grows upward, more vertical forms
  for (let i = 0; i < 12; i++) {
    let colors = random(paletteA);
    organismsA.push({
      x: random(-200, 200),
      y: random(-400, 400),
      z: random(-150, 150),
      w: random(40, 120),
      h: random(200, 600),  // Taller
      d: random(30, 80),
      rx: random(TWO_PI),
      ry: random(TWO_PI),
      rz: random(TWO_PI),
      color: colors,
      birthTime: i * 0.08, // Staggered birth (0 to ~1 normalized)
      breathOffset: random(TWO_PI)
    });
  }
}

function initOrganismB() {
  organismsB = [];
  // Organism B grows outward, more horizontal forms
  for (let i = 0; i < 12; i++) {
    let colors = random(paletteB);
    organismsB.push({
      x: random(-300, 300),
      y: random(-300, 300),
      z: random(-100, 100),
      w: random(150, 500),  // Wider
      h: random(60, 150),
      d: random(40, 100),
      rx: random(TWO_PI),
      ry: random(TWO_PI),
      rz: random(TWO_PI),
      color: colors,
      birthTime: i * 0.08,
      breathOffset: random(TWO_PI)
    });
  }
}

function draw() {
  background(0);
  
  let now = millis();
  let cycleTime = now - cycleStartTime;
  let totalCycle = CYCLE_DURATION * 2; // Both organisms
  
  // Loop the full cycle
  if (cycleTime >= totalCycle) {
    cycleStartTime = now;
    cycleTime = 0;
    // Regenerate for variation
    initOrganismA();
    initOrganismB();
  }
  
  // Determine which organism and local time
  let localTime, progress;
  if (cycleTime < CYCLE_DURATION) {
    currentOrganism = 0;
    localTime = cycleTime;
  } else {
    currentOrganism = 1;
    localTime = cycleTime - CYCLE_DURATION;
  }
  
  progress = localTime / CYCLE_DURATION; // 0 to 1
  
  // Calculate phase
  // 0.00 - 0.05: Title card fade in
  // 0.05 - 0.15: Title hold + organism ghost
  // 0.15 - 0.20: Title fade out, organism birth
  // 0.20 - 0.85: Growth and full state
  // 0.85 - 0.95: Organism fade out
  // 0.95 - 1.00: Black gap before next
  
  let titleAlpha = 0;
  let organismAlpha = 0;
  let growthProgress = 0;
  
  if (progress < 0.05) {
    // Title fade in
    titleAlpha = map(progress, 0, 0.05, 0, 255);
    organismAlpha = 0;
  } else if (progress < 0.15) {
    // Title hold, ghost geometry appears
    titleAlpha = 255;
    organismAlpha = map(progress, 0.05, 0.15, 0, 30);
    growthProgress = 0;
  } else if (progress < 0.20) {
    // Title fade, organism birth
    titleAlpha = map(progress, 0.15, 0.20, 255, 0);
    organismAlpha = map(progress, 0.15, 0.20, 30, 80);
    growthProgress = map(progress, 0.15, 0.20, 0, 0.1);
  } else if (progress < 0.85) {
    // Growth and full state
    titleAlpha = 0;
    organismAlpha = 80;
    growthProgress = map(progress, 0.20, 0.70, 0.1, 1.0);
    growthProgress = constrain(growthProgress, 0, 1);
  } else if (progress < 0.95) {
    // Fade out
    titleAlpha = 0;
    organismAlpha = map(progress, 0.85, 0.95, 80, 0);
    growthProgress = 1;
  } else {
    // Black gap
    titleAlpha = 0;
    organismAlpha = 0;
  }
  
  // Draw organism
  push();
  rotateY(frameCount * 0.003);
  rotateX(frameCount * 0.001);
  
  let shapes = currentOrganism === 0 ? organismsA : organismsB;
  let palette = currentOrganism === 0 ? paletteA : paletteB;
  
  for (let i = 0; i < shapes.length; i++) {
    let s = shapes[i];
    
    // Only show if growth progress has reached this shape's birth time
    if (growthProgress < s.birthTime) continue;
    
    // Individual shape growth
    let shapeGrowth = map(growthProgress, s.birthTime, s.birthTime + 0.2, 0, 1);
    shapeGrowth = constrain(shapeGrowth, 0, 1);
    shapeGrowth = easeOutCubic(shapeGrowth);
    
    // Breathing
    let breath = sin(frameCount * 0.03 + s.breathOffset);
    let breathScale = 1 + breath * 0.05;
    
    // Alpha with breathing
    let baseAlpha = organismAlpha * shapeGrowth;
    let alpha = baseAlpha + breath * 10;
    alpha = constrain(alpha, 0, 100);
    
    push();
    translate(s.x, s.y, s.z);
    rotateX(s.rx);
    rotateY(s.ry);
    rotateZ(s.rz);
    
    let w = s.w * shapeGrowth * breathScale;
    let h = s.h * shapeGrowth * breathScale;
    let d = s.d * shapeGrowth;
    
    // Gradient box with translucent faces
    let c1 = color(s.color[0], s.color[1], s.color[2], alpha);
    let c2 = color(s.color[0] * 0.7, s.color[1] * 0.7, s.color[2] * 0.7, alpha * 0.8);
    
    drawGradientBox(w, h, d, c1, c2);
    pop();
  }
  pop();
  
  // Draw title card (2D overlay)
  if (titleAlpha > 0) {
    drawTitleCard(currentOrganism, titleAlpha);
  }
}

function drawGradientBox(w, h, d, c1, c2) {
  // Front
  beginShape();
  fill(c1);
  vertex(-w/2, -h/2, d/2);
  vertex(w/2, -h/2, d/2);
  fill(c2);
  vertex(w/2, h/2, d/2);
  vertex(-w/2, h/2, d/2);
  endShape(CLOSE);
  
  // Back
  beginShape();
  fill(c2);
  vertex(-w/2, -h/2, -d/2);
  vertex(w/2, -h/2, -d/2);
  fill(c1);
  vertex(w/2, h/2, -d/2);
  vertex(-w/2, h/2, -d/2);
  endShape(CLOSE);
  
  // Left
  beginShape();
  fill(c1);
  vertex(-w/2, -h/2, d/2);
  vertex(-w/2, -h/2, -d/2);
  fill(c2);
  vertex(-w/2, h/2, -d/2);
  vertex(-w/2, h/2, d/2);
  endShape(CLOSE);
  
  // Right
  beginShape();
  fill(c1);
  vertex(w/2, -h/2, d/2);
  vertex(w/2, -h/2, -d/2);
  fill(c2);
  vertex(w/2, h/2, -d/2);
  vertex(w/2, h/2, d/2);
  endShape(CLOSE);
  
  // Top
  beginShape();
  fill(c1);
  vertex(-w/2, -h/2, d/2);
  vertex(w/2, -h/2, d/2);
  vertex(w/2, -h/2, -d/2);
  vertex(-w/2, -h/2, -d/2);
  endShape(CLOSE);
  
  // Bottom
  beginShape();
  fill(c2);
  vertex(-w/2, h/2, d/2);
  vertex(w/2, h/2, d/2);
  vertex(w/2, h/2, -d/2);
  vertex(-w/2, h/2, -d/2);
  endShape(CLOSE);
}

function drawTitleCard(organism, alpha) {
  push();
  // Reset to 2D
  resetMatrix();
  
  // Semi-transparent black overlay
  fill(0, alpha * 0.8);
  rectMode(CENTER);
  rect(0, 0, width, height);
  
  // Title text
  fill(255, alpha);
  textAlign(CENTER, CENTER);
  textSize(32);
  
  if (organism === 0) {
    text("MIRADAS TANGENTES", 0, -100);
    textSize(72);
    text("I", 0, 0);
    textSize(24);
    fill(255, alpha * 0.6);
    text("organism a / warm", 0, 100);
  } else {
    text("MIRADAS TANGENTES", 0, -100);
    textSize(72);
    text("II", 0, 0);
    textSize(24);
    fill(255, alpha * 0.6);
    text("organism b / cool", 0, 100);
  }
  
  pop();
}

function easeOutCubic(t) {
  return 1 - pow(1 - t, 3);
}

// For testing - press space to skip to next organism, 'r' to restart
function keyPressed() {
  if (key === ' ') {
    cycleStartTime = millis() - CYCLE_DURATION;
  }
  if (key === 'r') {
    cycleStartTime = millis();
    initOrganismA();
    initOrganismB();
  }
}
  </script>
</body>
</html>
