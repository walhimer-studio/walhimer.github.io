<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Three.js rewrite of p5.js city corridor</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #ffffff;
      overflow: hidden;
    }
    canvas {
      display: block;
      margin: 0;
    }
  </style>
</head>
<body>
<script type="module">
import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js";

let city = [];
let cols = 1;
let rows = 15;
let spacing = 175;
let palette = [310, 45, 30, 210, 270];
let camZ = 2000;
let targetCamZ = 2000;
let camSpeed = 0.5;
let gradientTextures = [];

const scene = new THREE.Scene();
scene.background = new THREE.Color(1, 1, 1);

const camera = new THREE.PerspectiveCamera(60, 1536 / 864, 1, 10000);
camera.position.set(0, 50, camZ);

const renderer = new THREE.WebGLRenderer({
  antialias: true,
  alpha: true
});
renderer.setSize(1536, 864);
renderer.setPixelRatio(4);
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.body.appendChild(renderer.domElement);

const ambient = new THREE.AmbientLight(0xffffff, 0.45);
scene.add(ambient);

const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
scene.add(dirLight);

function rand(min, max) {
  return Math.random() * (max - min) + min;
}

function randFromArray(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

function mapValue(value, inMin, inMax, outMin, outMax, clamp = false) {
  let t = (value - inMin) / (inMax - inMin);
  let result = outMin + (outMax - outMin) * t;
  if (!clamp) return result;
  if (outMin < outMax) return Math.max(outMin, Math.min(outMax, result));
  return Math.max(outMax, Math.min(outMin, result));
}

function hsbToRgb(h, s, b) {
  s /= 100;
  b /= 100;

  let k = (n) => (n + h / 60) % 6;
  let f = (n) => b * (1 - s * Math.max(0, Math.min(k(n), 4 - k(n), 1)));

  return {
    r: f(5),
    g: f(3),
    bl: f(1)
  };
}

function makeGradientTexture() {
  const canvas = document.createElement("canvas");
  canvas.width = 64;
  canvas.height = 256;
  const ctx = canvas.getContext("2d");

  const hue1 = randFromArray(palette);
  const hue2 = randFromArray(palette);
  const sat = rand(80, 100);
  const bri = rand(80, 100);

  for (let y = 0; y < canvas.height; y++) {
    const inter = y / (canvas.height - 1);
    const hBlend = THREE.MathUtils.lerp(hue1, hue2, inter);
    const rgb = hsbToRgb(hBlend, sat, bri);
    ctx.strokeStyle = `rgba(${Math.round(rgb.r * 255)}, ${Math.round(rgb.g * 255)}, ${Math.round(rgb.bl * 255)}, 1)`;
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(canvas.width, y);
    ctx.stroke();
  }

  const tex = new THREE.CanvasTexture(canvas);
  tex.colorSpace = THREE.SRGBColorSpace;
  tex.needsUpdate = true;
  return tex;
}

for (let i = 0; i < 10; i++) {
  gradientTextures.push(makeGradientTexture());
}

for (let z = -rows / 2; z < rows / 2; z++) {
  let w = rand(200, 400);
  let d = rand(200, 400);
  let h = rand(300, 600);
  let pulseSpeed = rand(0.01, 0.03);
  let pulseOffset = rand(0, Math.PI * 2);
  let tex = randFromArray(gradientTextures);

  const geometry = new THREE.BoxGeometry(w, h, d);
  const material = new THREE.MeshPhongMaterial({
    map: tex,
    transparent: true,
    opacity: 1
  });

  const mesh = new THREE.Mesh(geometry, material);
  scene.add(mesh);

  city.push({
    x: 0,
    z: z * spacing,
    w,
    h,
    d,
    tex,
    pulseSpeed,
    pulseOffset,
    mesh,
    baseH: h
  });
}

let frameCount = 0;

function animate() {
  requestAnimationFrame(animate);
  frameCount++;

  targetCamZ -= camSpeed;
  camZ = THREE.MathUtils.lerp(camZ, targetCamZ, 0.05);

  let camX = Math.sin(frameCount * 0.005) * 50;
  let camY = 50;
  let camTargetZ = camZ - 100;

  camera.position.set(camX, camY, camZ);
  camera.lookAt(0, camY, camTargetZ);

  dirLight.position.set(
    Math.sin(frameCount * 0.01),
    -1,
    Math.cos(frameCount * 0.01)
  );

  for (let b of city) {
    let distanceToCam = Math.abs(b.z - camZ);
    let alpha = mapValue(distanceToCam, 0, 1000, 1, 0, true);
    let pulse = 1 + 0.05 * Math.sin(frameCount * b.pulseSpeed + b.pulseOffset);
    let h = b.baseH * pulse;
    let baseY = Math.max(160 - h / 2, 0);

    b.mesh.position.set(b.x, baseY, b.z);
    b.mesh.scale.set(1, h / b.baseH, 1);
    b.mesh.material.opacity = alpha;
  }

  renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
