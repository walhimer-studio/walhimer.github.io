<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Google tag (gtag.js) -->

    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

  <meta charset="UTF-8" />
  <title>Emergent DNA – Discs → Rectangles</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    }
    canvas {
      display: block;
    }
    .info {
      position: fixed;
      left: 16px;
      bottom: 16px;
      color: rgba(255, 255, 255, 0.65);
      font-size: 11px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      pointer-events: none;
      user-select: none;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <div class="info" id="info"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>

  <script>
    /******************************************************
     * Emergent DNA – Discs → Rectangles
     * -----------------------------------------------
     * - Global organism age (Option A: born at mint)
     * - Incubation mode before mint (per-device age)
     * - Week 1: only discs, growing in count + layers
     * - Week 2: discs gradually mutate into rectangles
     * - No blobs: only discs and rectangles
     * - Background: white at birth, then slowly color-shifts
     ******************************************************/

    "use strict";

    // --------- CONFIG / MODES --------------------------------

    const MINT_FAMILY_ID = "EmergentDNA_Family_A";

    // true  => minted NFT, global age born at mint
    // false => pre-mint incubation mode (per-device, dev only)
    const MINT_MODE = true;

    // Set this before mint; this is the organism's birth.
    // Example: "2025-12-07T15:00:00Z"
    const MINT_BIRTH_ISO = "2025-12-07T15:00:00Z";

    const INCUBATION_STORAGE_KEY =
      "emergentDNA_incubation_start_" + MINT_FAMILY_ID;

    // --------- SAFE TIME / AGE HELPERS ------------------------

    const birthMsMintMode = (function () {
      if (!MINT_MODE) return null;
      const t = Date.parse(MINT_BIRTH_ISO);
      if (Number.isFinite(t)) return t;
      // Failsafe: if ISO isn't valid yet, treat "now" as birth.
      return Date.now();
    })();

    let incubationStartMs = null;
    let incubationResolved = false;

    function resolveIncubationStart() {
      if (incubationResolved) return;
      incubationResolved = true;
      let start = Date.now();

      try {
        const existing = window.localStorage.getItem(INCUBATION_STORAGE_KEY);
        if (existing != null) {
          const parsed = parseInt(existing, 10);
          if (Number.isFinite(parsed)) {
            start = parsed;
          }
        } else {
          window.localStorage.setItem(INCUBATION_STORAGE_KEY, String(start));
        }
      } catch (e) {
        // localStorage may be blocked; fall back to per-session.
      }

      incubationStartMs = start;
    }

    function getAgeSeconds() {
      const now = Date.now();

      if (MINT_MODE) {
        const ageMs = now - birthMsMintMode;
        return Math.max(0, ageMs / 1000);
      } else {
        if (!incubationResolved) {
          resolveIncubationStart();
        }
        const base = incubationStartMs || now;
        const ageMs = now - base;
        return Math.max(0, ageMs / 1000);
      }
    }

    // --------- BASIC HASH / RNG -------------------------------

    function hashStringToUint(str) {
      let h = 0;
      for (let i = 0; i < str.length; i++) {
        h = (h * 31 + str.charCodeAt(i)) | 0;
      }
      return (h >>> 0);
    }

    const MINT_HASH = hashStringToUint(MINT_FAMILY_ID);

    function makeSeededRngInt(intSeed) {
      let a = intSeed >>> 0;
      if (a === 0) a = 0x12345678;
      return function () {
        a |= 0;
        a = (a + 0x6D2B79F5) | 0;
        let t = Math.imul(a ^ (a >>> 15), 1 | a);
        t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
        return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
      };
    }

    function clamp01(v) {
      return v < 0 ? 0 : v > 1 ? 1 : v;
    }

    // HSL (0–360, 0–1, 0–1) + alpha 0–1 → [r,g,b,a(0–255)]
    function hslToRgba(h, s, l, a) {
      h = ((h % 360) + 360) % 360;
      s = clamp01(s);
      l = clamp01(l);
      a = clamp01(a);

      const c = (1 - Math.abs(2 * l - 1)) * s;
      const x = c * (1 - Math.abs(((h / 60) % 2) - 1));
      const m = l - c / 2;

      let r1, g1, b1;
      if (h < 60)       { r1 = c; g1 = x; b1 = 0; }
      else if (h < 120) { r1 = x; g1 = c; b1 = 0; }
      else if (h < 180) { r1 = 0; g1 = c; b1 = x; }
      else if (h < 240) { r1 = 0; g1 = x; b1 = c; }
      else if (h < 300) { r1 = x; g1 = 0; b1 = c; }
      else              { r1 = c; g1 = 0; b1 = x; }

      const r = (r1 + m) * 255;
      const g = (g1 + m) * 255;
      const b = (b1 + m) * 255;
      const alpha = a * 255;

      return [r, g, b, alpha];
    }

    // --------- BACKGROUND GENOME (PER-FAMILY) -----------------

    const mintRng = makeSeededRngInt(MINT_HASH ^ 0x9e3779b9);

    const bgMode = Math.floor(mintRng() * 5); // 0..4

    const BG_GENOME = (function () {
      switch (bgMode) {
        case 0: // near-white / soft grey
          return {
            baseHue: mintRng() * 360,
            hueRange: 18,
            baseSat: 0.05,
            satRange: 0.06,
            baseBright: 0.86,
            brightRange: 0.08
          };
        case 1: // warm yellow / amber
          return {
            baseHue: 45 + mintRng() * 15,   // 45–60
            hueRange: 25,
            baseSat: 0.22,
            satRange: 0.15,
            baseBright: 0.70,
            brightRange: 0.20
          };
        case 2: // soft rose / pink
          return {
            baseHue: 335 + mintRng() * 20,  // 335–355 (wraps)
            hueRange: 35,
            baseSat: 0.24,
            satRange: 0.25,
            baseBright: 0.62,
            brightRange: 0.18
          };
        case 3: // cool blue
          return {
            baseHue: 200 + mintRng() * 25,  // 200–225
            hueRange: 30,
            baseSat: 0.20,
            satRange: 0.18,
            baseBright: 0.50,
            brightRange: 0.18
          };
        case 4: // gentle green
        default:
          return {
            baseHue: 105 + mintRng() * 25,  // 105–130
            hueRange: 30,
            baseSat: 0.22,
            satRange: 0.18,
            baseBright: 0.60,
            brightRange: 0.20
          };
      }
    })();

    function sampleBackgroundHSL(ageDays) {
      // Slow drift similar to previous Emergent DNA :contentReference[oaicite:2]{index=2}
      const slow1 = Math.sin(ageDays * 0.20 + (MINT_HASH & 0xffff) * 0.0001);
      const slow2 = Math.sin(ageDays * 0.05 + (MINT_HASH >>> 16) * 0.0001);
      const flux = 0.5 + 0.25 * slow1 + 0.15 * slow2;

      const hue = (BG_GENOME.baseHue + (flux - 0.5) * BG_GENOME.hueRange) % 360;
      const sat = BG_GENOME.baseSat + (flux - 0.5) * BG_GENOME.satRange;
      const brt = BG_GENOME.baseBright + (flux - 0.5) * BG_GENOME.brightRange;

      return {
        h: (hue + 360) % 360,
        s: clamp01(sat),
        l: clamp01(brt)
      };
    }

    // --------- TIMELINE: DISCS & RECTANGLES -------------------

    const MAX_DISCS = 10;  // Max total "cells" (disc or rect)

    // Week 1 (0–7 days): only discs, count ramps 1 → MAX_DISCS
    function discsCountForAge(ageDays) {
      if (ageDays <= 0) return 1;
      if (ageDays >= 7) return MAX_DISCS;
      const t = ageDays / 7; // 0..1 over first week
      return Math.max(1, Math.round(1 + t * (MAX_DISCS - 1)));
    }

    // Week 2 (7–14 days): discs mutate into rects gradually.
    // After 14 days: all entities are rectangles.
    function timelineEntities(ageDays, total) {
      let rectCount = 0;
      if (ageDays > 7) {
        const t = Math.min(1, (ageDays - 7) / 7); // 0..1 across second week
        rectCount = Math.round(total * t);
      }
      return {
        total: total,
        rectCount: rectCount  // first rectCount indices are rectangles
      };
    }

    // Per-disc "birth" day for layer growth (oldest = disc 0).
    function discBirthDayForIndex(i) {
      if (i === 0) return 0; // first disc at birth
      const span = 7;        // by day 7 we want all discs born
      const steps = MAX_DISCS - 1;
      return (span * i) / steps;
    }

    function layersForDisc(ageDays, discIndex) {
      const birthDay = discBirthDayForIndex(discIndex);
      const discAgeDays = ageDays - birthDay;
      if (discAgeDays < 0) return 0; // not yet born

      const discAgeHours = discAgeDays * 24;

      // 0–1h => 2 layers, 1–2h => 3, >2h => 4
      if (discAgeHours < 1) return 2;
      if (discAgeHours < 2) return 3;
      return 4;
    }

    // --------- CELL DNA: DISCS & RECTangles -------------------

    const gradientPairsHSL = [
      // Red → Yellow
      { c1: { h: 0,   s: 1, l: 0.5 }, c2: { h: 45,  s: 1, l: 0.5 } },
      // Cyan → Blue
      { c1: { h: 180, s: 1, l: 0.5 }, c2: { h: 240, s: 1, l: 0.5 } },
      // Magenta → Yellow
      { c1: { h: 300, s: 1, l: 0.5 }, c2: { h: 60,  s: 1, l: 0.5 } }
    ];

    let discDNA = []; // static DNA per index (position, size, gradients, phase)

    function initDiscDNA(canvasSize) {
      discDNA = [];
      const minDim = canvasSize;

      for (let i = 0; i < MAX_DISCS; i++) {
        const rng = makeSeededRngInt(MINT_HASH + 1013904223 * (i + 1));

        // Layout:
        // disc 0 at center, others on ring(s)
        let cxNorm = 0;
        let cyNorm = 0;
        if (i > 0) {
          const ringIndex = i <= 4 ? 1 : 2; // simple two-ring layout
          const radiusNorm = ringIndex === 1 ? 0.30 : 0.50;
          const countInRing = ringIndex === 1 ? 3 : 6;
          const idxInRing = ringIndex === 1 ? (i - 1) : (i - 4);
          const angle = (2 * Math.PI * idxInRing) / countInRing;
          cxNorm = radiusNorm * Math.cos(angle);
          cyNorm = radiusNorm * Math.sin(angle);
        }

        const baseRadiusNorm = 0.23 + 0.07 * rng(); // relative to minDim
        const baseSize = baseRadiusNorm * minDim;

        // Gradient layers
        const layerGradients = [];
        for (let l = 0; l < 4; l++) {
          const pairIndex = Math.floor(rng() * gradientPairsHSL.length);
          layerGradients.push(gradientPairsHSL[pairIndex]);
        }

        const timeOffset = rng() * Math.PI * 2;

        discDNA.push({
          index: i,
          cxNorm: cxNorm,
          cyNorm: cyNorm,
          baseSize: baseSize,
          timeOffset: timeOffset,
          layerGradients: layerGradients
        });
      }
    }

    // --------- p5 INSTANCE ------------------------------------

    let sketch = new p5(function (p) {
      let lastMs = 0;

      p.setup = function () {
        const size = Math.min(window.innerWidth, window.innerHeight);
        p.createCanvas(size, size, p.WEBGL);
        p.pixelDensity(1); // avoid cropping in NFT viewers
        p.frameRate(60);
        p.noStroke();
        p.colorMode(p.RGB, 255, 255, 255, 255);
        p.ortho(-size / 2, size / 2, -size / 2, size / 2, -1000, 1000);

        initDiscDNA(size);
        lastMs = p.millis();

        updateInfo();
      };

      p.windowResized = function () {
        const size = Math.min(window.innerWidth, window.innerHeight);
        p.resizeCanvas(size, size);
        p.ortho(-size / 2, size / 2, -size / 2, size / 2, -1000, 1000);
        initDiscDNA(size);
      };

      function drawBackground(ageSec) {
        const ageDays = ageSec / 86400;

        // HSL background from genome
        const bgHSL = sampleBackgroundHSL(ageDays);

        // At birth fully white; over first week fade into genome color,
        // over second week drift more.
        const weekBlend = clamp01(ageDays / 7);       // 0..1 (0–7 days)
        const longBlend = clamp01((ageDays - 7) / 7); // 0..1 (7–14 days)
        const genomeBlend = Math.min(1, weekBlend + 0.3 * longBlend);

        const white = [0, 0, 1]; // h,s,l
        const mixH = bgHSL.h; // keep hue of genome
        const mixS = white[1] * (1 - genomeBlend) + bgHSL.s * genomeBlend;
        const mixL = white[2] * (1 - genomeBlend) + bgHSL.l * genomeBlend;

        const [r, g, b, a] = hslToRgba(mixH, mixS, mixL, 1);
        p.background(r, g, b, a);
      }

      function drawGradientDisk(x, y, size, pair, tGlobal, timeOffset) {
        const detail = 64;
        const radius = size * 0.5;

        // Uniform breathing (no stretching)
        const scaleFactor = 1 + 0.06 * Math.sin(tGlobal + timeOffset);
        const rScaled = radius * scaleFactor;

        p.push();
        p.translate(x, y, 0);

        p.beginShape(p.TRIANGLE_FAN);

        // Center vertex uses first color
        const cCenter = hslToRgba(
          pair.c1.h, pair.c1.s, pair.c1.l, 0.33
        );
        p.fill(cCenter[0], cCenter[1], cCenter[2], cCenter[3]);
        p.vertex(0, 0, 0);

        // Outer ring vertices use angle-based interp between c1 and c2
        for (let i = 0; i <= detail; i++) {
          const angle = (2 * Math.PI * i) / detail;
          const mix = i / detail;
          const h = pair.c1.h + (pair.c2.h - pair.c1.h) * mix;
          const s = pair.c1.s + (pair.c2.s - pair.c1.s) * mix;
          const l = pair.c1.l + (pair.c2.l - pair.c1.l) * mix;
          const cOuter = hslToRgba(h, s, l, 0.33);
          p.fill(cOuter[0], cOuter[1], cOuter[2], cOuter[3]);
          const vx = Math.cos(angle) * rScaled;
          const vy = Math.sin(angle) * rScaled;
          p.vertex(vx, vy, 0);
        }

        p.endShape(p.CLOSE);
        p.pop();
      }

      function drawGradientRect(x, y, w, h, pair, tGlobal, timeOffset) {
        // Uniform breathing; keep rectangles as rectangles (no distortion).
        const scaleFactor = 1 + 0.06 * Math.sin(tGlobal * 0.85 + timeOffset);
        const wScaled = w * scaleFactor;
        const hScaled = h * scaleFactor;

        const [r1, g1, b1, a1] = hslToRgba(
          pair.c1.h, pair.c1.s, pair.c1.l, 0.33
        );
        const [r2, g2, b2, a2] = hslToRgba(
          pair.c2.h, pair.c2.s, pair.c2.l, 0.33
        );

        p.push();
        p.translate(x, y, 0);

        p.beginShape();

        // Left edge = c1, right edge = c2 (like your gradient panel code)
        p.fill(r1, g1, b1, a1);
        p.vertex(-wScaled / 2, -hScaled / 2, 0);

        p.fill(r2, g2, b2, a2);
        p.vertex(wScaled / 2, -hScaled / 2, 0);

        p.vertex(wScaled / 2, hScaled / 2, 0);

        p.fill(r1, g1, b1, a1);
        p.vertex(-wScaled / 2, hScaled / 2, 0);

        p.endShape(p.CLOSE);
        p.pop();
      }

      p.draw = function () {
        const now = p.millis();
        const dt = (now - lastMs) / 1000;
        lastMs = now;

        const ageSec = getAgeSeconds();
        const ageDays = ageSec / 86400;
        const tGlobal = ageSec * 0.15; // for breathing motion

        drawBackground(ageSec);

        const discCount = discsCountForAge(ageDays);
        const timeline = timelineEntities(ageDays, discCount);

        const size = Math.min(p.width, p.height);
        const minDim = size;

        for (let i = 0; i < timeline.total; i++) {
          const dna = discDNA[i];
          const discLayers = layersForDisc(ageDays, i);
          if (discLayers <= 0) continue; // disc not yet born

          const cx = dna.cxNorm * (minDim * 0.5);
          const cy = dna.cyNorm * (minDim * 0.5);

          if (i < timeline.rectCount) {
            // Rectangle mode (mutation in week 2)
            const w = dna.baseSize * 1.4;
            const h = dna.baseSize * 0.55;
            const pair = dna.layerGradients[0];
            drawGradientRect(cx, cy, w, h, pair, tGlobal, dna.timeOffset);
          } else {
            // Disc mode
            const maxLayers = Math.min(4, discLayers);
            for (let l = 0; l < maxLayers; l++) {
              const layerScale = 1 - 0.18 * l;
              const sizeLayer = dna.baseSize * layerScale;
              const pair = dna.layerGradients[l];
              drawGradientDisk(
                cx,
                cy,
                sizeLayer,
                pair,
                tGlobal,
                dna.timeOffset + l * 0.7
              );
            }
          }
        }

        if (p.frameCount % 90 === 0) {
          updateInfo();
        }
      };
    });

    // --------- INFO OVERLAY (AGE TEXT) ------------------------

    function formatAge(ageSec) {
      const ageDays = ageSec / 86400;
      if (ageDays >= 1) {
        return ageDays.toFixed(2) + " days";
      }
      const ageHours = ageSec / 3600;
      if (ageHours >= 1) {
        return ageHours.toFixed(2) + " hours";
      }
      const ageMinutes = ageSec / 60;
      return ageMinutes.toFixed(1) + " minutes";
    }

    function updateInfo() {
      const infoEl = document.getElementById("info");
      if (!infoEl) return;

      const ageSec = getAgeSeconds();
      const ageText = formatAge(ageSec);

      if (MINT_MODE) {
        const bornLabel = "Born at mint, global age: ";
        infoEl.textContent = "Emergent DNA — " + bornLabel + ageText;
      } else {
        const incubatingLabel = "Incubating on this device: ";
        infoEl.textContent = "Emergent DNA — " + incubatingLabel + ageText;
      }
    }
  </script>
