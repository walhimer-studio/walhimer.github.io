    generateRandomGradient(length) {

    randomInterval() { return 100 + Math.random() * 900; }

        idx = Math.random() > 0.5 ? (idx + 1) % 8 : (idx + 7) % 8;
        this.dx = dirs[idx][0];
        this.dy = dirs[idx][1];

    initCanvas() {

                data[idx + 1] = col.g;
                data[idx + 2] = col.b;

    generateSourceEdge() {

                data[idx + 2] = c.b;
                data[idx + 3] = 255;

            case "right": gen(y => (y * w + (w - 1)) * 4, h); break;

    getSourceEdgeCoord(x, y) {

    smear() {

}
function layoutSmears() {

        var y = parseFloat(div.dataset.y || 0);
        var w = parseFloat(div.dataset.width || 0);
        var h = parseFloat(div.dataset.height || 0);
        div.style.left = (x * vw) + "px";
        div.style.top = (y * vh) + "px";
        div.style.width = (w * vw) + "px";

window.addEventListener("load", function() { layoutSmears(); initSmears(); });
window.addEventListener("resize", layoutSmears);
layoutSmears();
initSmears();
