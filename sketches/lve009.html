<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Three.js Corridor</title>
<style>
body{margin:0;overflow:hidden;background:white;}
</style>
</head>

<body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r155/three.min.js"></script>

<script>

let city = [];
let rows = 15;
let spacing = 175;
let palette = [310,45,30,210,270];

let camZ = 2000;
let targetCamZ = 2000;
let camSpeed = 0.5;

let scene,camera,renderer;
let gradientTextures=[];
let frameCount=0;

function rand(a,b){ return a + Math.random()*(b-a); }

function random(arr){
return arr[Math.floor(Math.random()*arr.length)];
}

function hsbToRgb(h,s,b){
s/=100; b/=100;
let k=n=>(n+h/60)%6;
let f=n=>b*(1-s*Math.max(0,Math.min(k(n),4-k(n),1)));
return new THREE.Color(f(5),f(3),f(1));
}

function createGradientTexture(){

let hue1=random(palette);
let hue2=random(palette);
let sat=rand(80,100);
let bri=rand(80,100);

let canvas=document.createElement("canvas");
canvas.width=64;
canvas.height=256;

let ctx=canvas.getContext("2d");

for(let y=0;y<256;y++){

let inter=y/256;
let hBlend=hue1+(hue2-hue1)*inter;

let c=hsbToRgb(hBlend,sat,bri);

ctx.strokeStyle=
"rgb("+
Math.floor(c.r*255)+","+
Math.floor(c.g*255)+","+
Math.floor(c.b*255)+")";

ctx.beginPath();
ctx.moveTo(0,y);
ctx.lineTo(64,y);
ctx.stroke();

}

return new THREE.CanvasTexture(canvas);

}

function init(){

scene=new THREE.Scene();

camera=new THREE.PerspectiveCamera(
60,
window.innerWidth/window.innerHeight,
1,
10000
);

renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

scene.background=new THREE.Color("white");

scene.add(new THREE.AmbientLight(0xffffff,0.5));

let light=new THREE.DirectionalLight(0xffffff,1);
light.position.set(0,1,1);
scene.add(light);

for(let i=0;i<10;i++){
gradientTextures.push(createGradientTexture());
}

for(let z=-rows/2; z<rows/2; z++){

let w=rand(200,400);
let d=rand(200,400);
let h=rand(300,600);

let pulseSpeed=rand(0.01,0.03);
let pulseOffset=Math.random()*Math.PI*2;

let tex=random(gradientTextures);

let geo=new THREE.BoxGeometry(w,h,d);

let mat=new THREE.MeshPhongMaterial({
map:tex,
transparent:true
});

let mesh=new THREE.Mesh(geo,mat);

scene.add(mesh);

city.push({
x:0,
z:z*spacing,
w,h,d,
pulseSpeed,
pulseOffset,
mesh
});

}

animate();

}

function animate(){

requestAnimationFrame(animate);
frameCount++;

targetCamZ-=camSpeed;
camZ+=(targetCamZ-camZ)*0.05;

let camX=Math.sin(frameCount*0.005)*50;
let camY=50;
let camTargetZ=camZ-100;

camera.position.set(camX,camY,camZ);
camera.lookAt(0,camY,camTargetZ);

for(let b of city){

let distance=Math.abs(b.z-camZ);
let alpha=Math.max(0,1-distance/1000);

let pulse=1+0.05*Math.sin(frameCount*b.pulseSpeed+b.pulseOffset);

let h=b.h*pulse;
let baseY=Math.max(160-h/2,0);

b.mesh.scale.y=pulse;
b.mesh.position.set(b.x,baseY,b.z);
b.mesh.material.opacity=alpha;

}

renderer.render(scene,camera);

}

init();

</script>

</body>
</html>
