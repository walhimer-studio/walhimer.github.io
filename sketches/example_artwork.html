<script>
let particles = [];

function setup() {
  createCanvas(2160, 3840);
  
  // Create some particles
  for (let i = 0; i < 100; i++) {
    particles.push({
      x: random(width),
      y: random(height),
      vx: random(-2, 2),
      vy: random(-2, 2),
      size: random(5, 20)
    });
  }
}

function draw() {
  background(0, 10); // Fade effect
  
  // Update and draw particles
  for (let p of particles) {
    p.x += p.vx;
    p.y += p.vy;
    
    // Wrap around edges
    if (p.x < 0) p.x = width;
    if (p.x > width) p.x = 0;
    if (p.y < 0) p.y = height;
    if (p.y > height) p.y = 0;
    
    // Draw
    fill(255, 150);
    noStroke();
    ellipse(p.x, p.y, p.size);
  }
}
</script>
