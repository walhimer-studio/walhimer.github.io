<!DOCTYPE html>
<html lang="en">
<head>

  <script>

    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-TVXX0YPGCN');

  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Three.js Translation of p5.js Corridor</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: white;
      overflow: hidden;
    }
    canvas {
      display: block;
    }
  </style>
</head>
<body>
<script type="module">
import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js";

let city = [];
let cols = 1;
let rows = 15;
let spacing = 175;
let palette = [310, 45, 30, 210, 270];
let camZ = 2000;
let targetCamZ = 2000;
let camSpeed = 0.5;
let gradientTextures = [];
let frameCountCustom = 0;

const scene = new THREE.Scene();
scene.background = new THREE.Color(1, 1, 1);

const camera = new THREE.PerspectiveCamera(45, 1536 / 864, 1, 10000);

const renderer = new THREE.WebGLRenderer({
  antialias: true,
  alpha: true
});
renderer.setSize(1536, 864);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 4));
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.body.appendChild(renderer.domElement);

const ambient = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambient);

const directional = new THREE.DirectionalLight(0xffffff, 1.0);
scene.add(directional);

function random(a, b) {
  if (Array.isArray(a)) {
    return a[Math.floor(Math.random() * a.length)];
  }
  return Math.random() * (b - a) + a;
}

function lerp(a, b, t) {
  return a + (b - a) * t;
}

function mapValue(value, inMin, inMax, outMin, outMax, clamp = false) {
  let t = (value - inMin) / (inMax - inMin);
  let result = outMin + (outMax - outMin) * t;

  if (!clamp) return result;

  if (outMin < outMax) {
    return Math.max(outMin, Math.min(outMax, result));
  }
  return Math.max(outMax, Math.min(outMin, result));
}

function hsbToRgb(h, s, v) {
  h = ((h % 360) + 360) % 360;
  s /= 100;
  v /= 100;

  const c = v * s;
  const x = c * (1 - Math.abs((h / 60) % 2 - 1));
  const m = v - c;

  let r = 0, g = 0, b = 0;

  if (h < 60) {
    r = c; g = x; b = 0;
  } else if (h < 120) {
    r = x; g = c; b = 0;
  } else if (h < 180) {
    r = 0; g = c; b = x;
  } else if (h < 240) {
    r = 0; g = x; b = c;
  } else if (h < 300) {
    r = x; g = 0; b = c;
  } else {
    r = c; g = 0; b = x;
  }

  return {
    r: Math.round((r + m) * 255),
    g: Math.round((g + m) * 255),
    b: Math.round((b + m) * 255)
  };
}

function makeGradientTexture() {
  const canvas = document.createElement("canvas");
  canvas.width = 64;
  canvas.height = 256;
  const ctx = canvas.getContext("2d");

  const hue1 = random(palette);
  const hue2 = random(palette);
  const sat = random(80, 100);
  const bri = random(80, 100);

  for (let y = 0; y < canvas.height; y++) {
    const inter = mapValue(y, 0, canvas.height, 0, 1);
    const hBlend = lerp(hue1, hue2, inter);
    const rgb = hsbToRgb(hBlend, sat, bri);

    ctx.strokeStyle = `rgb(${rgb.r}, ${rgb.g}, ${rgb.b})`;
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(canvas.width, y);
    ctx.stroke();
  }

  const tex = new THREE.CanvasTexture(canvas);
  tex.colorSpace = THREE.SRGBColorSpace;
  tex.wrapS = THREE.ClampToEdgeWrapping;
  tex.wrapT = THREE.ClampToEdgeWrapping;
  tex.magFilter = THREE.LinearFilter;
  tex.minFilter = THREE.LinearFilter;
  tex.needsUpdate = true;
  return tex;
}

for (let i = 0; i < 10; i++) {
  gradientTextures.push(makeGradientTexture());
}

for (let z = -rows / 2; z < rows / 2; z++) {
  const w = random(200, 400);
  const d = random(200, 400);
  const h = random(300, 600);
  const pulseSpeed = random(0.01, 0.03);
  const pulseOffset = random(0, Math.PI * 2);
  const tex = random(gradientTextures);

  const geometry = new THREE.BoxGeometry(w, h, d);
  const material = new THREE.MeshPhongMaterial({
    map: tex,
    transparent: true,
    opacity: 1
  });

  const mesh = new THREE.Mesh(geometry, material);
  scene.add(mesh);

  city.push({
    x: 0,
    z: z * spacing,
    w,
    h,
    d,
    tex,
    pulseSpeed,
    pulseOffset,
    mesh,
    baseH: h
  });
}

function animate() {
  requestAnimationFrame(animate);
  frameCountCustom++;

  targetCamZ -= camSpeed;
  camZ = lerp(camZ, targetCamZ, 0.05);

  const camX = Math.sin(frameCountCustom * 0.005) * 50;
  const camY = 50;
  const camTargetZ = camZ - 100;

  camera.position.set(camX, camY, camZ);
  camera.lookAt(0, camY, camTargetZ);

  directional.position.set(
    Math.sin(frameCountCustom * 0.01),
    -1,
    Math.cos(frameCountCustom * 0.01)
  );

  for (const b of city) {
    const distanceToCam = Math.abs(b.z - camZ);
    const alpha = mapValue(distanceToCam, 0, 1000, 1, 0, true);
    const pulse = 1 + 0.05 * Math.sin(frameCountCustom * b.pulseSpeed + b.pulseOffset);
    const currentH = b.baseH * pulse;
    const baseY = Math.max(160 - currentH / 2, 0);

    b.mesh.position.set(b.x, baseY, b.z);
    b.mesh.scale.set(1, pulse, 1);
    b.mesh.material.opacity = alpha;
  }

  renderer.render(scene, camera);
}

animate();

window.addEventListener("resize", () => {
  camera.aspect = 1536 / 864;
  camera.updateProjectionMatrix();
  renderer.setSize(1536, 864);
});
</script>
</body>
</html>
