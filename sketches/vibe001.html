<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>VIBE – Single Mint PoC</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    }
    canvas {
      display: block;
    }
    .info {
      position: fixed;
      left: 16px;
      bottom: 16px;
      color: rgba(255, 255, 255, 0.55);
      font-size: 11px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      pointer-events: none;
      user-select: none;
    }
  </style>
</head>
<body>
  <div class="info" id="info"></div>

  <!-- If you prefer local p5, replace this with: <script src="p5.min.js"></script> -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>

  <script>
    /******************************************************
     * VIBE – Single Mint Proof of Concept (meditative + glow)
     * ------------------------------------------------------
     * - One shared DNA
     * - Many cells with local state
     * - Global + neighbor influence (emergent behavior)
     * - Persistent "age" via localStorage
     * - Per-mint background "home color" that drifts
     * - DNA-driven glow (firefly-like breathing)
     ******************************************************/

    // --------- MINT ID / TIMESTAMP ---------
    // For vibe1.html use "vibe_single_mint_poc_001"
    // For vibe2.html use "vibe_single_mint_poc_002"

    const MINT_ID = "vibe_single_mint_poc_001";
    const MINT_TS_KEY = "vibe_mint_timestamp_" + MINT_ID;

    function getMintTimestamp() {
      const existing = localStorage.getItem(MINT_TS_KEY);
      if (existing) {
        const t = parseInt(existing, 10);
        if (!Number.isNaN(t)) return t;
      }
      const now = Date.now();
      localStorage.setItem(MINT_TS_KEY, String(now));
      return now;
    }

    const mintTimestampMs = getMintTimestamp();

    function getAgeSeconds() {
      return (Date.now() - mintTimestampMs) / 1000;
    }

    // --------- HASHING / RNG (INT-BASED) ---------

    // Hash string -> 32-bit unsigned int
    function hashStringToUint(str) {
      let h = 0;
      for (let i = 0; i < str.length; i++) {
        h = (h * 31 + str.charCodeAt(i)) | 0;
      }
      return (h >>> 0);
    }

    const MINT_HASH = hashStringToUint(MINT_ID);

    // Mulberry32-style RNG taking an integer seed
    function makeSeededRngInt(intSeed) {
      let a = intSeed >>> 0;
      if (a === 0) a = 0x12345678; // avoid zero seed
      return function() {
        a |= 0;
        a = (a + 0x6D2B79F5) | 0;
        let t = Math.imul(a ^ (a >>> 15), 1 | a);
        t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
        return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
      };
    }

    const mintRng = makeSeededRngInt(MINT_HASH ^ 0x9e3779b9);

    function constrain01(v) {
      return v < 0 ? 0 : v > 1 ? 1 : v;
    }

    // --------- BACKGROUND GENOME (PER-MINT) ---------

    // Each mint gets its own "home world": near-white, yellow, rose, blue, green.
    const bgMode = Math.floor(mintRng() * 5); // 0..4

    const BG_GENOME = (() => {
      switch (bgMode) {
        case 0: // near-white / soft grey
          return {
            baseHue: mintRng() * 360,
            hueRange: 20,
            baseSat: 0.02,
            satRange: 0.05,
            baseBright: 0.82,
            brightRange: 0.10
          };
        case 1: // warm yellow / amber
          return {
            baseHue: 45 + mintRng() * 15,   // 45–60
            hueRange: 25,
            baseSat: 0.18,
            satRange: 0.15,
            baseBright: 0.65,
            brightRange: 0.20
          };
        case 2: // soft rose / pink
          return {
            baseHue: 335 + mintRng() * 20,  // 335–355 (wraps)
            hueRange: 35,
            baseSat: 0.20,
            satRange: 0.25,
            baseBright: 0.58,
            brightRange: 0.18
          };
        case 3: // cool blue
          return {
            baseHue: 200 + mintRng() * 25,  // 200–225
            hueRange: 30,
            baseSat: 0.16,
            satRange: 0.18,
            baseBright: 0.45,
            brightRange: 0.18
          };
        case 4: // gentle green
        default:
          return {
            baseHue: 105 + mintRng() * 25,  // 105–130
            hueRange: 30,
            baseSat: 0.18,
            satRange: 0.18,
            baseBright: 0.55,
            brightRange: 0.20
          };
      }
    })();

    function sampleBackgroundColor(ageDays) {
      // Very slow drift based on age in days
      const slow1 = Math.sin(ageDays * 0.2 + (MINT_HASH & 0xffff) * 0.0001);
      const slow2 = Math.sin(ageDays * 0.05 + (MINT_HASH >>> 16) * 0.0001);
      const flux = 0.5 + 0.25 * slow1 + 0.15 * slow2; // ~0.1..0.9

      const hue = (BG_GENOME.baseHue + (flux - 0.5) * BG_GENOME.hueRange) % 360;
      const sat = BG_GENOME.baseSat + (flux - 0.5) * BG_GENOME.satRange;
      const brt = BG_GENOME.baseBright + (flux - 0.5) * BG_GENOME.brightRange;

      return {
        h: (hue + 360) % 360,
        s: constrain01(sat),
        b: constrain01(brt)
      };
    }

    // --------- CELL GENOME (SHARED DNA) ---------

    const VIBE_GENOME = {
      minSize: 60,
      maxSize: 170,
      minSpeed: 0.0012,  // slow, meditative
      maxSpeed: 0.012,
      minOpacity: 0.10,
      maxOpacity: 0.60,
      moodLerp: 0.010,   // slow mood change
      neighborWeight: 0.45,
      globalWeight: 0.35,
      localWeight: 0.20
    };

    // --------- CELL FACTORY (DNA + STATE + BEHAVIOR) ---------

    function createVibeCell(index, total, p) {
      const normalizedIndex = total <= 1 ? 0.5 : index / (total - 1);
      const dnaSeedInt = (MINT_HASH + Math.imul(index + 1, 0x9e3779b9)) >>> 0;
      const rng = makeSeededRngInt(dnaSeedInt);

      const canvasScale = Math.min(p.width, p.height);

      const dna = {
        id: "cell_" + index,
        orbitRadiusBase: p.lerp(0.18, 0.32, rng()) * canvasScale,
        orbitRadiusJitter: p.lerp(0.03, 0.08, rng()) * canvasScale,
        initialAngle: rng() * Math.PI * 2,
        timeScale: p.lerp(0.35, 1.2, rng()),
        opacityBias: p.lerp(-0.08, 0.08, rng()),
        hueOffset: (rng() - 0.5) * 22,   // slight hue shift from background
        glowPhase: rng() * Math.PI * 2,  // glow timing
        glowDepth: 0.3 + 0.5 * rng()     // how deep the glow breathes
      };

      const state = {
        mood: 0.5,
        neighborMood: 0.5,
        longTermActivity: 0.35,
        angle: dna.initialAngle,
        localPhase: rng() * 1000
      };

      function localRhythm(tMinutes) {
        const slow = Math.sin(tMinutes * dna.timeScale * 0.08 + state.localPhase);
        const slower = Math.sin(tMinutes * dna.timeScale * 0.015 + state.localPhase * 0.37);
        return 0.5 + 0.3 * slow + 0.15 * slower; // 0..1-ish
      }

      function setNeighborMood(v) {
        state.neighborMood = p.constrain(v, 0, 1);
      }

      function update(globalActivity, dt) {
        const dtNorm = dt * 60.0;
        state.longTermActivity = p.lerp(
          state.longTermActivity,
          globalActivity,
          0.003 * dtNorm
        );

        const tMinutes = getAgeSeconds() / 60;
        const local = localRhythm(tMinutes);

        const targetMood =
          VIBE_GENOME.globalWeight * globalActivity +
          VIBE_GENOME.neighborWeight * state.neighborMood +
          VIBE_GENOME.localWeight * local;

        state.mood = p.lerp(state.mood, targetMood, VIBE_GENOME.moodLerp * dtNorm);

        const speed = p.lerp(
          VIBE_GENOME.minSpeed,
          VIBE_GENOME.maxSpeed,
          state.mood
        ) * dna.timeScale;

        state.angle += speed * dtNorm;
      }

      function getPosition(centerX, centerY, p) {
        const baseRadius = dna.orbitRadiusBase;
        const jitter = dna.orbitRadiusJitter;
        const moodJitter = (state.mood - 0.5) * 0.5;
        const radius = baseRadius + jitter * moodJitter;

        const x = centerX + radius * Math.cos(state.angle);
        const y = centerY + radius * Math.sin(state.angle * 0.97);

        return { x, y };
      }

      function draw(centerX, centerY, p, bgColor) {
        const pos = getPosition(centerX, centerY, p);
        const x = pos.x;
        const y = pos.y;

        const sizeBase = p.lerp(VIBE_GENOME.minSize, VIBE_GENOME.maxSize, state.mood);
        const sizePulse =
          1.0 + 0.10 * Math.sin(getAgeSeconds() * 0.0003 + state.localPhase);
        const w = sizeBase * sizePulse;
        const rectH = sizeBase * (0.55 + 0.45 * state.mood);

        // DNA-driven glow: very slow breathing, per-cell phase & depth
        const tMinutes = getAgeSeconds() / 60;
        const glowWave = Math.sin(tMinutes * 0.03 * dna.timeScale + dna.glowPhase);
        const glowFactor = 0.5 + 0.5 * glowWave;                // 0..1
        const glow = 0.3 + dna.glowDepth * glowFactor;          // ~0.3..(0.3+glowDepth)

        // Color: background-centered with offset and glow brightness
        const hueVal = (bgColor.h + dna.hueOffset) % 360;
        const satVal = 0.18 + 0.35 * state.mood;
        const brightVal = 0.25 + 0.6 * state.mood * (0.7 + 0.3 * glow);

        const opacityBase = p.lerp(
          VIBE_GENOME.minOpacity,
          VIBE_GENOME.maxOpacity,
          state.mood
        );
        const effectiveOpacity = p.constrain(
          opacityBase + dna.opacityBias,
          0.08,
          0.75
        ) * (0.7 + 0.3 * glow); // glow lifts opacity a bit

        p.push();
        p.translate(x, y);
        p.rotate(state.angle * 0.35);
        p.rectMode(p.CENTER);
        p.noStroke();

        // soft halo (glow) behind the panel
        const haloW = w * (1.2 + 0.5 * glow);
        const haloH = rectH * (1.1 + 0.4 * glow);
        p.fill(hueVal, satVal * 0.5, Math.min(1, brightVal * 1.1), effectiveOpacity * 0.35 * glow);
        p.rect(0, 0, haloW, haloH, 20);

        // outer panel
        p.fill(hueVal, satVal, brightVal, effectiveOpacity);
        p.rect(0, 0, w, rectH, 14);

        // inner core: slightly warmer or cooler, also glows
        const hueVal2 = (hueVal + 18) % 360;
        p.fill(hueVal2, satVal * 0.8, Math.min(1, brightVal * 1.1), effectiveOpacity * 0.8);
        p.rect(0, 0, w * 0.56, rectH * 0.44, 12);

        p.pop();
      }

      return {
        id: dna.id,
        get mood() { return state.mood; },
        setNeighborMood,
        update,
        draw
      };
    }

    // --------- GLOBAL P5 SKETCH ---------

    let vibeCells = [];
    let lastMs = 0;
    let globalActivity = 0.3;

    const MAX_CELLS = 10; // fewer, calmer

    new p5(function(p) {
      p.setup = function() {
        const size = Math.min(window.innerWidth, window.innerHeight);
        p.createCanvas(size, size);
        p.colorMode(p.HSB, 360, 1, 1, 1);
        p.noStroke();
        lastMs = p.millis();

        const cellCount = MAX_CELLS;
        for (let i = 0; i < cellCount; i++) {
          vibeCells.push(createVibeCell(i, cellCount, p));
        }

        updateInfo();
      };

      p.windowResized = function() {
        const size = Math.min(window.innerWidth, window.innerHeight);
        p.resizeCanvas(size, size);
      };

      p.draw = function() {
        const now = p.millis();
        const dt = (now - lastMs) / 1000;
        lastMs = now;

        const ageSec = getAgeSeconds();
        const ageDays = ageSec / 86400;

        // Very gentle global activity drift
        const slow1 = Math.sin(ageDays * 0.12 + (MINT_HASH & 0xffff) * 0.0002);
        const slow2 = Math.sin(ageDays * 0.03 + (MINT_HASH >>> 16) * 0.0002);
        const combined = 0.5 + 0.25 * slow1 + 0.15 * slow2;
        const targetActivity = p.constrain(0.18 + 0.5 * combined, 0, 1);
        globalActivity = p.lerp(globalActivity, targetActivity, 0.006 * dt * 60);

        // Background color sampled from per-mint BG_GENOME + age
        const bgColor = sampleBackgroundColor(ageDays);
        p.background(bgColor.h, bgColor.s, bgColor.b, 1);

        // Neighbor coupling
        const moods = vibeCells.map(c => c.mood);
        for (let i = 0; i < vibeCells.length; i++) {
          let sum = moods[i];
          let count = 1;
          const left = (i - 1 + vibeCells.length) % vibeCells.length;
          const right = (i + 1) % vibeCells.length;
          sum += moods[left] + moods[right];
          count += 2;
          const avg = sum / count;
          vibeCells[i].setNeighborMood(avg);
        }

        const centerX = p.width * 0.5;
        const centerY = p.height * 0.5;

        // Update + draw
        for (let i = 0; i < vibeCells.length; i++) {
          vibeCells[i].update(globalActivity, dt);
        }
        for (let i = 0; i < vibeCells.length; i++) {
          vibeCells[i].draw(centerX, centerY, p, bgColor);
        }

        if (p.frameCount % 90 === 0) {
          updateInfo();
        }
      };
    });

    // --------- INFO OVERLAY ---------

    function updateInfo() {
      const infoEl = document.getElementById("info");
      if (!infoEl) return;
      const ageSec = getAgeSeconds();
      const ageDays = ageSec / 86400;
      const ageStr =
        ageDays >= 1
          ? ageDays.toFixed(1) + " days"
          : (ageSec / 3600).toFixed(2) + " hours";
      infoEl.textContent = "VIBE – age: " + ageStr;
    }
  </script>
</body>
</html>
