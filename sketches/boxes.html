<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Three.js Boilerplate (p5.js-style)</title>
  <style>
    body { margin: 0; overflow: hidden; background: white; }
  </style>
</head>
<body>
  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
  <script>
    let scene, camera, renderer;
    let objects = [];

    function init() {
      // Scene and camera setup
      scene = new THREE.Scene();
      camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 1, 10000);
      camera.position.z = 1500;

      // Renderer setup
      renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      document.body.appendChild(renderer.domElement);

      // Lighting
      const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
      const directionalLight = new THREE.DirectionalLight(0xffffff, 0.5);
      directionalLight.position.set(1, 1, 1);
      scene.add(ambientLight, directionalLight);

      // Create translucent gradient boxes
      for (let i = 0; i < 7; i++) {
        let w = Math.random() * 500 + 100;
        let h = Math.random() * 300 + 100;
        let d = Math.random() * 400 + 100;

        let geometry = new THREE.BoxGeometry(w, h, d);
        let material = new THREE.MeshPhongMaterial({
          color: new THREE.Color(`hsl(${Math.random() * 360}, 100%, 60%)`),
          transparent: true,
          opacity: 0.4,
        });

        let mesh = new THREE.Mesh(geometry, material);
        mesh.position.set(
          Math.random() * 800 - 400,
          Math.random() * 800 - 400,
          Math.random() * 800 - 400
        );
        mesh.userData.fadeOffset = Math.random() * Math.PI * 2;

        scene.add(mesh);
        objects.push(mesh);
      }

      window.addEventListener('resize', onWindowResize);
    }

    function animate(time) {
      requestAnimationFrame(animate);

      scene.rotation.y = time * 0.0001;

      objects.forEach(obj => {
        let t = time * 0.001;
        let fade = Math.sin(t + obj.userData.fadeOffset);
        obj.material.opacity = THREE.MathUtils.mapLinear(fade, -1, 1, 0.1, 0.5);
      });

      renderer.render(scene, camera);
    }

    function onWindowResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    // Run
    init();
    animate();
  </script>
</body>
</html>
