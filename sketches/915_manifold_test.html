<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Emergent DNA</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.2/p5.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      margin: 0;
      overflow: hidden;
      background: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    
    canvas {
      display: block;
      touch-action: none;
    }
    
    /* Control Panel */
    #controls {
      position: fixed;
      top: 20px;
      right: 20px;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
      width: 280px;
      max-height: 90vh;
      overflow-y: auto;
      z-index: 1000;
      transition: transform 0.3s ease, opacity 0.3s ease;
    }
    
    #controls.hidden {
      transform: translateX(320px);
      opacity: 0;
      pointer-events: none;
    }
    
    #controls h2 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 16px;
      color: #000;
    }
    
    .control-group {
      margin-bottom: 20px;
    }
    
    .control-group label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: #666;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    .control-group input[type="range"] {
      width: 100%;
      height: 6px;
      border-radius: 3px;
      background: #e0e0e0;
      outline: none;
      -webkit-appearance: none;
    }
    
    .control-group input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #000;
      cursor: pointer;
      transition: transform 0.1s ease;
    }
    
    .control-group input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.2);
    }
    
    .control-group input[type="range"]::-moz-range-thumb {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #000;
      cursor: pointer;
      border: none;
      transition: transform 0.1s ease;
    }
    
    .control-group input[type="range"]::-moz-range-thumb:hover {
      transform: scale(1.2);
    }
    
    .value-display {
      font-size: 14px;
      color: #000;
      font-weight: 600;
      margin-top: 4px;
    }
    
    /* Toggle Button */
    #toggleControls {
      position: fixed;
      top: 20px;
      right: 20px;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border: none;
      border-radius: 50%;
      width: 48px;
      height: 48px;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      z-index: 999;
      transition: transform 0.2s ease;
    }
    
    #toggleControls:hover {
      transform: scale(1.1);
    }
    
    #toggleControls.hidden {
      display: none;
    }
    
    /* Info Badge */
    #info {
      position: fixed;
      bottom: 20px;
      left: 20px;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 12px;
      color: #666;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
    }
    
    #info strong {
      color: #000;
      display: block;
      margin-bottom: 4px;
    }
    
    /* Mobile Responsive */
    @media (max-width: 768px) {
      #controls {
        width: calc(100vw - 40px);
        max-width: 320px;
        top: auto;
        bottom: 20px;
        right: 20px;
        max-height: 60vh;
      }
      
      #controls.hidden {
        transform: translateY(calc(100% + 40px));
      }
      
      #toggleControls {
        top: auto;
        bottom: 20px;
        right: 20px;
      }
    }
  </style>
</head>
<body>
  <!-- Toggle Button -->
  <button id="toggleControls">âš™ï¸</button>
  
  <!-- Control Panel -->
  <div id="controls">
    <h2>DNA Parameters</h2>
    
    <div class="control-group">
      <label>Rotation Speed</label>
      <input type="range" id="rotSpeed" min="0.1" max="3.0" step="0.1" value="1.0">
      <div class="value-display" id="rotSpeedValue">1.0</div>
    </div>
    
    <div class="control-group">
      <label>Breath Speed</label>
      <input type="range" id="breathSpeed" min="0.1" max="3.0" step="0.1" value="1.0">
      <div class="value-display" id="breathSpeedValue">1.0</div>
    </div>
    
    <div class="control-group">
      <label>Box Size</label>
      <input type="range" id="boxSize" min="0.3" max="2.0" step="0.1" value="1.0">
      <div class="value-display" id="boxSizeValue">1.0</div>
    </div>
    
    <div class="control-group">
      <label>Alpha Min</label>
      <input type="range" id="alphaMin" min="0.05" max="0.8" step="0.05" value="0.35">
      <div class="value-display" id="alphaMinValue">0.35</div>
    </div>
    
    <div class="control-group">
      <label>Alpha Max</label>
      <input type="range" id="alphaMax" min="0.5" max="1.0" step="0.02" value="0.92">
      <div class="value-display" id="alphaMaxValue">0.92</div>
    </div>
    
    <div class="control-group">
      <label>Saturation</label>
      <input type="range" id="saturation" min="0" max="100" step="5" value="80">
      <div class="value-display" id="saturationValue">80</div>
    </div>
    
    <div class="control-group">
      <label>Brightness</label>
      <input type="range" id="brightness" min="50" max="100" step="5" value="95">
      <div class="value-display" id="brightnessValue">95</div>
    </div>
    
    <div class="control-group">
      <label>Hue Spread</label>
      <input type="range" id="hueSpread" min="0" max="360" step="10" value="140">
      <div class="value-display" id="hueSpreadValue">140</div>
    </div>
    
    <div class="control-group">
      <label>Growth</label>
      <input type="range" id="growth" min="0" max="100" step="5" value="100">
      <div class="value-display" id="growthValue">100</div>
    </div>
  </div>
  
  <!-- Info Badge -->
  <div id="info">
    <strong>Emergent DNA</strong>
    Mark Walhimer Â· Miradas Tangentes
  </div>

  <script>
    "use strict";
    
    // ============================================
    // SEEDED RANDOM GENERATOR (Manifold Compatible)
    // ============================================
    
    // Get token ID from URL or use default for testing
    const urlParams = new URLSearchParams(window.location.search);
    const tokenId = urlParams.get('tokenId') || '0';
    
    // Simple hash function for seed generation
    function hashCode(str) {
      let hash = 0;
      for (let i = 0; i < str.length; i++) {
        const char = str.charCodeAt(i);
        hash = ((hash << 5) - hash) + char;
        hash = hash & hash;
      }
      return hash;
    }
    
    // Seeded random number generator
    class SeededRandom {
      constructor(seed) {
        this.seed = seed;
      }
      
      random() {
        const x = Math.sin(this.seed++) * 10000;
        return x - Math.floor(x);
      }
    }
    
    const seed = hashCode(tokenId);
    const seededRandom = new SeededRandom(seed);
    
    // ============================================
    // PARAMETERS
    // ============================================
    
    const params = {
      rotSpeed: 1.0,
      breathSpeed: 1.0,
      boxSize: 1.0,
      alphaMin: 0.35,
      alphaMax: 0.92,
      saturation: 80,
      brightness: 95,
      hueSpread: 140,
      growth: 100
    };
    
    // ============================================
    // UI CONTROLS
    // ============================================
    
    // Update parameter values from sliders
    function setupControls() {
      const controls = [
        'rotSpeed', 'breathSpeed', 'boxSize', 'alphaMin', 
        'alphaMax', 'saturation', 'brightness', 'hueSpread', 'growth'
      ];
      
      controls.forEach(name => {
        const slider = document.getElementById(name);
        const display = document.getElementById(name + 'Value');
        
        slider.addEventListener('input', (e) => {
          const value = parseFloat(e.target.value);
          params[name] = value;
          display.textContent = value;
        });
      });
      
      // Toggle controls visibility
      const toggleBtn = document.getElementById('toggleControls');
      const controlsPanel = document.getElementById('controls');
      let controlsVisible = true;
      
      toggleBtn.addEventListener('click', () => {
        controlsVisible = !controlsVisible;
        if (controlsVisible) {
          controlsPanel.classList.remove('hidden');
          toggleBtn.classList.remove('hidden');
        } else {
          controlsPanel.classList.add('hidden');
        }
      });
    }
    
    // ============================================
    // P5.JS SKETCH
    // ============================================
    
    let dnaState;
    const MAX_BOXES = 24;
    
    function setup() {
      createCanvas(windowWidth, windowHeight, WEBGL);
      pixelDensity(displayDensity());
      colorMode(HSB, 360, 100, 100, 1);
      noStroke();
      dnaState = buildDNAState();
      setupControls();
    }
    
    function buildDNAState() {
      const boxes = [];
      for (let i = 0; i < MAX_BOXES; i++) {
        boxes.push({
          w: 400 * (0.4 + seededRandom.random() * 0.8),
          h: 300 * (0.4 + seededRandom.random() * 0.8),
          d: 200 * (0.4 + seededRandom.random() * 0.8),
          hueOffset: seededRandom.random() * 360,
          pos: {
            x: seededRandom.random() * 500 - 250,
            y: seededRandom.random() * 600 - 300,
            z: seededRandom.random() * 400 - 200
          },
          rotOffset: seededRandom.random() * TWO_PI
        });
      }
      return boxes;
    }
    
    function draw() {
      background(0, 0, 100);
      const t = millis();
      const globalRotation = t * 0.0002 * params.rotSpeed;
      const breathCycle = (sin(t * 0.001 * params.breathSpeed) + 1) * 0.5;
      const currentAlpha = lerp(params.alphaMin, params.alphaMax, breathCycle);
      const visibleCount = Math.max(1, Math.floor((params.growth / 100) * MAX_BOXES));
      
      push();
      rotateY(globalRotation);
      rotateX(globalRotation * 0.5);
      
      for (let i = 0; i < visibleCount; i++) {
        const b = dnaState[i];
        push();
        translate(b.pos.x, b.pos.y, b.pos.z);
        rotateZ(b.rotOffset + globalRotation);
        
        const h1 = (b.hueOffset) % 360;
        const h2 = (b.hueOffset + params.hueSpread) % 360;
        drawSoftBox(
          b.w * params.boxSize, 
          b.h * params.boxSize, 
          b.d * params.boxSize, 
          h1, h2, currentAlpha
        );
        pop();
      }
      pop();
    }
    
    function drawSoftBox(W, H, D, h1, h2, a) {
      const w = W / 2, h = H / 2, d = D / 2;
      const c1 = color(h1, params.saturation, params.brightness, a);
      const c2 = color(h2, params.saturation, params.brightness, a);
      
      // Front face
      beginShape();
      fill(c1); vertex(-w, -h, d);
      fill(c2); vertex(w, -h, d);
      fill(c1); vertex(w, h, d);
      fill(c2); vertex(-w, h, d);
      endShape(CLOSE);
      
      // Back face
      beginShape();
      fill(c2); vertex(w, -h, -d);
      fill(c1); vertex(-w, -h, -d);
      fill(c2); vertex(-w, h, -d);
      fill(c1); vertex(w, h, -d);
      endShape(CLOSE);
      
      // Bottom face
      beginShape();
      fill(c1); vertex(-w, -h, -d);
      fill(c2); vertex(w, -h, -d);
      fill(c1); vertex(-w, -h, d);
      fill(c2); vertex(w, -h, d);
      endShape(CLOSE);
    }
    
    function windowResized() {
      resizeCanvas(windowWidth, windowHeight);
    }
  </script>
</body>
</html>
