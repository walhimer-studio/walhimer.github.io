<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Text to 3D</title>
  <style>
    body { margin: 0; overflow: hidden; font-family: sans-serif; }
    #ui {
      position: absolute;
      top: 10px; left: 10px;
      z-index: 10;
      background: rgba(255,255,255,0.9);
      padding: 10px;
      border-radius: 8px;
    }
    input, button {
      font-size: 18px;
      margin-top: 5px;
    }
  </style>
</head>
<body>
  <div id="ui">
    <input type="text" id="textInput" value="Hello 3D!" />
    <br>
    <button onclick="generateText()">Generate</button>
    <button onclick="downloadSTL()">Download STL</button>
  </div>

  <!-- ✅ Use compatible version of Three.js -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.132.2/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.132.2/examples/js/loaders/FontLoader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.132.2/examples/js/geometries/TextGeometry.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.132.2/examples/js/exporters/STLExporter.js"></script>

  <script>
    let scene, camera, renderer, mesh, font;

    function init() {
      scene = new THREE.Scene();
      camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 1000);
      camera.position.z = 200;

      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      document.body.appendChild(renderer.domElement);

      const light = new THREE.DirectionalLight(0xffffff, 1);
      light.position.set(0, 1, 1);
      scene.add(light);
      scene.add(new THREE.AmbientLight(0x888888));

      new THREE.FontLoader().load(
        'https://threejs.org/examples/fonts/helvetiker_regular.typeface.json',
        (loadedFont) => {
          font = loadedFont;
          generateText(); // show something by default
        }
      );

      animate();
    }

    function generateText() {
      const text = document.getElementById("textInput").value;
      if (!font || !text) return;

      if (mesh) scene.remove(mesh);

      const geometry = new THREE.TextGeometry(text, {
        font: font,
        size: 20,
        height: 5,
        bevelEnabled: false
      });
      geometry.computeBoundingBox();
      geometry.center();

      const material = new THREE.MeshStandardMaterial({ color: 0x0077ff });
      mesh = new THREE.Mesh(geometry, material);
      scene.add(mesh);
    }

    function downloadSTL() {
      if (!mesh) return;
      const exporter = new THREE.STLExporter();
      const result = exporter.parse(mesh);
      const blob = new Blob([result], { type: 'text/plain' });
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = 'text3d.stl';
      link.click();
    }

    function animate() {
      requestAnimationFrame(animate);
      if (mesh) mesh.rotation.y += 0.01;
      renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    init();
  </script>
</body>
</html>
