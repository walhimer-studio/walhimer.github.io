    <title>3JS Shader Port</title>
    <style>body { margin: 0; overflow: hidden; background: white; }</style>
</head>
<body>
    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>
    <script type="module">
        import * as THREE from 'three';

        // 1. DATA FROM YOUR P5 SKETCH
        const rows = 15;
        const spacing = 175;
        const palette = [310, 45, 30, 210, 270];
        let camZ = 2000;
        let targetCamZ = 2000;
        const camSpeed = 0.5;
        let frameCount = 0;

        // 2. THE SHADER (This is the "Secret Sauce" to match p5 colors)
        const vertexShader = `
            varying vec2 vUv;
            void main() {
                vUv = uv;
                gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
            }
        `;

        const fragmentShader = `
            varying vec2 vUv;
            uniform vec3 uColor1; // HSB 1
            uniform vec3 uColor2; // HSB 2
            uniform float uAlpha;

            // Function to convert HSB to RGB (Makes 3JS act like p5)
            vec3 hsb2rgb(vec3 c) {
                vec4 K = vec4(1.0, 2.0 / 3.0, 1.0 / 3.0, 3.0);
                vec3 p = abs(fract(c.xxx + K.xyz) * 6.0 - K.www);
                return c.z * mix(K.xxx, clamp(p - K.xxx, 0.0, 1.0), c.y);
            }

            void main() {
                // Blend hues based on vertical position (vUv.y)
                float hue = mix(uColor1.x, uColor2.x, vUv.y) / 360.0;
                float sat = uColor1.y / 100.0;
                float bri = uColor1.z / 100.0;
                
                vec3 rgb = hsb2rgb(vec3(hue, sat, bri));
                gl_FragColor = vec4(rgb, uAlpha);
            }
        `;

        // 3. SCENE SETUP
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(1, 1, 1);
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 5000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio); // High quality
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 4. BUILDING CREATION
        const city = [];
        const boxGeo = new THREE.BoxGeometry(1, 1, 1);

        for (let z = -rows / 2; z < rows / 2; z++) {
            const h1 = palette[Math.floor(Math.random() * palette.length)];
            const h2 = palette[Math.floor(Math.random() * palette.length)];
            const sat = Math.random() * 20 + 80;
            const bri = Math.random() * 20 + 80;

            const shaderMat = new THREE.ShaderMaterial({
                uniforms: {
                    uColor1: { value: new THREE.Vector3(h1, sat, bri) },
                    uColor2: { value: new THREE.Vector3(h2, sat, bri) },
                    uAlpha: { value: 1.0 }
                },
                vertexShader,
                fragmentShader,
                transparent: true
            });

            const mesh = new THREE.Mesh(boxGeo, shaderMat);
            scene.add(mesh);

            city.push({
                mesh,
                zPos: z * spacing,
                w: Math.random() * 200 + 200,
                h: Math.random() * 300 + 300,
                d: Math.random() * 200 + 200,
                pulseSpeed: Math.random() * 0.02 + 0.01,
                pulseOffset: Math.random() * Math.PI * 2
            });
        }

        // 5. ANIMATION LOOP
        function animate() {
            requestAnimationFrame(animate);
            frameCount++;

            targetCamZ -= camSpeed;
            camZ = camZ + (targetCamZ - camZ) * 0.05;
            
            camera.position.set(Math.sin(frameCount * 0.005) * 50, 50, camZ);
            camera.lookAt(0, 50, camZ - 100);

            city.forEach(b => {
                let dist = Math.abs(b.zPos - camZ);
                let alpha = 1.0 - (dist / 1000);
                b.mesh.material.uniforms.uAlpha.value = Math.max(0, Math.min(1, alpha));

                let pulse = 1 + 0.05 * Math.sin(frameCount * b.pulseSpeed + b.pulseOffset);
                let currentH = b.h * pulse;
                
                // Position logic: baseY = max(160 - h / 2, 0)
                let baseY = Math.max(160 - currentH / 2, 0);
                
                b.mesh.scale.set(b.w, currentH, b.d);
                b.mesh.position.set(0, -baseY, b.zPos); // Inverted Y for 3JS
            });

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
