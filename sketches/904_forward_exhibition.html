    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>904 (forward) - Exhibition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>
<script>
// =====================================================
// MADRID — ~176 SECOND LINEAR PIECE
// Title (5s) -> Cubes (167s) -> Fade (4s) -> Credit (5s)
// =====================================================

const CANVAS_W = 2160;  // CHANGED from 1080
const CANVAS_H = 3840;  // CHANGED from 1920

const TITLE_DUR = 5;
const FADE_DUR = 4;
const CREDIT_DUR = 5;

const TITLE_TEXT = "904 (forward)";
const CREDIT_TEXT = "Mark Walhimer, 2026";

let startTimeSec = 0;
let overlay;

// Phase tracking
let phase = "title";
let phaseStartTime = 0;

// =====================================================
// CUBES ARTWORK
// =====================================================

let shapes = [];
let fadeSpeed = 0.01;
let travelSpeed = 2;
let camZ = 0;
let iteration = 0;
let maxZ = 20000;

// Store color data as raw HSB values
let colorSets = [];

// =====================================================
// SETUP
// =====================================================

function setup() {
  createCanvas(CANVAS_W, CANVAS_H, WEBGL);
  pixelDensity(2);
  frameRate(60);
  colorMode(HSB, 360, 100, 100, 255);
  setAttributes('alpha', true);

  document.body.style.margin = "0";
  document.body.style.overflow = "hidden";

  // Title/Credit overlay
  overlay = createGraphics(CANVAS_W, CANVAS_H);
  overlay.pixelDensity(2);
  overlay.textAlign(CENTER, CENTER);
  overlay.textSize(96);
  overlay.fill(255);

  // ---- CUBES INIT ----
  initColorsAndShapes();

  startTimeSec = millis() / 1000;
  phaseStartTime = startTimeSec;
  phase = "title";
}

function initColorsAndShapes() {
  shapes = [];
  iteration++;
  
  // ultra vivid, high-key translucent palette (whites, yellows, pinks, blues)
  // Store as raw HSB values: [hue, sat, bri, alpha]
  colorSets = [
    [[55, 100, 100, 60], [40, 100, 100, 30]],
    [[0, 0, 100, 25], [55, 80, 100, 40]],
    [[320, 100, 100, 60], [350, 100, 100, 30]],
    [[200, 100, 100, 50], [220, 100, 100, 30]]
  ];
  
  // stationary cubes scattered through 3-D space
  for (let j = 0; j < 200; j++) {
    let sw = random(1000, 2000);
    let sh = random(2000, 4000);
    let sd = random(1000, 3000);
    let sx = random(-2000, 2000);
    let sy = random(-2000, 2000);
    let sz = random(-maxZ, 0);
    shapes.push({
      sx: sx,
      sy: sy,
      sz: sz,
      sw: sw,
      sh: sh,
      sd: sd,
      colorSet: random(colorSets),
      fadeOffset: random(TWO_PI)
    });
  }
  
  camZ = 0;
}

// =====================================================
// DRAW
// =====================================================

function draw() {
  let now = millis() / 1000;
  let phaseElapsed = now - phaseStartTime;

  switch (phase) {
    case "title":
      resetCamera();
      background(0);
      drawTitle(phaseElapsed);
      if (phaseElapsed >= TITLE_DUR) {
        phase = "artwork";
        phaseStartTime = now;
        camZ = 0;
      }
      break;

    case "artwork":
      drawCubes();
      if (camZ < -maxZ) {
        phase = "fade";
        phaseStartTime = now;
      }
      break;

    case "fade":
      drawFadeToBlack(phaseElapsed);
      if (phaseElapsed >= FADE_DUR) {
        phase = "credit";
        phaseStartTime = now;
      }
      break;

    case "credit":
      resetCamera();
      background(0);
      drawCredit(phaseElapsed);
      if (phaseElapsed >= CREDIT_DUR) {
        phase = "title";
        phaseStartTime = now;
        initColorsAndShapes();
      }
      break;
  }
}

// =====================================================
// RESET CAMERA
// =====================================================

function resetCamera() {
  camera(0, 0, (height / 2) / tan(PI / 6), 0, 0, 0, 0, 1, 0);
}

// =====================================================
// TITLE
// =====================================================

function drawTitle(t) {
  let a = 255;
  if (t < 1) a = map(t, 0, 1, 0, 255);
  if (t > TITLE_DUR - 1) a = map(t, TITLE_DUR - 1, TITLE_DUR, 255, 0);

  overlay.clear();
  overlay.background(0);
  overlay.fill(255, a);
  overlay.textSize(96);
  overlay.text(TITLE_TEXT, CANVAS_W / 2, CANVAS_H / 2);

  push();
  resetMatrix();
  image(overlay, -width / 2, -height / 2);
  pop();
}

// =====================================================
// CREDIT
// =====================================================

function drawCredit(t) {
  let a = 255;
  if (t < 1) a = map(t, 0, 1, 0, 255);
  if (t > CREDIT_DUR - 1) a = map(t, CREDIT_DUR - 1, CREDIT_DUR, 255, 0);

  overlay.clear();
  overlay.background(0);
  overlay.fill(255, a);
  overlay.textSize(96);
  overlay.text(CREDIT_TEXT, CANVAS_W / 2, CANVAS_H / 2);

  push();
  resetMatrix();
  image(overlay, -width / 2, -height / 2);
  pop();
}

// =====================================================
// FADE TO BLACK
// =====================================================

function drawFadeToBlack(t) {
  colorMode(HSB, 360, 100, 100, 255);
  
  let bgBri = map(t, 0, FADE_DUR, 100, 0);
  background(0, 0, bgBri);
  
  camera(0, 0, camZ, 0, 0, camZ - 1000, 0, 1, 0);
  
  let fadeAmt = map(t, 0, FADE_DUR, 1, 0);
  
  if (fadeAmt > 0.1) {
    ambientLight(255 * fadeAmt);
    directionalLight(255 * fadeAmt, 255 * fadeAmt, 255 * fadeAmt, 1, 1, -1);
    
    rotateY(sin(millis() / 9000) * 0.1);
    rotateX(cos(millis() / 11000) * 0.05);
    
    for (let i = 0; i < shapes.length; i++) {
      let shape = shapes[i];
      let trans = map(sin(frameCount * fadeSpeed + shape.fadeOffset), -1, 1, 20, 100) * fadeAmt;
      
      push();
      translate(shape.sx, shape.sy, shape.sz);
      
      let col1 = shape.colorSet[0];
      let col2 = shape.colorSet[1];
      let c1 = color(col1[0], col1[1], col1[2], trans);
      let c2 = color(col2[0], col2[1], col2[2], trans);
      
      drawSoftGradientBox(shape.sw, shape.sh, shape.sd, c1, c2);
      pop();
    }
  }
}

// =====================================================
// CUBES ARTWORK
// =====================================================

function drawCubes() {
  colorMode(HSB, 360, 100, 100, 255);
  background(0, 0, 100);
  
  camZ -= travelSpeed;
  
  let bob = sin(frameCount * 0.01) * 50;
  camera(0, bob, camZ, 0, bob, camZ - 1000, 0, 1, 0);
  camera(0, 0, camZ, 0, 0, camZ - 1000, 0, 1, 0);
  
  ambientLight(255);
  directionalLight(255, 255, 255, 1, 1, -1);
  
  rotateY(sin(millis() / 9000) * 0.1);
  rotateX(cos(millis() / 11000) * 0.05);
  
  for (let i = 0; i < shapes.length; i++) {
    let shape = shapes[i];
    let trans = map(sin(frameCount * fadeSpeed + shape.fadeOffset), -1, 1, 20, 100);
    
    push();
    translate(shape.sx, shape.sy, shape.sz);
    
    let col1 = shape.colorSet[0];
    let col2 = shape.colorSet[1];
    let c1 = color(col1[0], col1[1], col1[2], trans);
    let c2 = color(col2[0], col2[1], col2[2], trans);
    
    drawSoftGradientBox(shape.sw, shape.sh, shape.sd, c1, c2);
    pop();
  }
}

function drawSoftGradientBox(bw, bh, bd, c1, c2) {
  noStroke();
  
  // front
  beginShape();
  fill(c1);
  vertex(-bw / 2, -bh / 2, bd / 2);
  fill(c2);
  vertex(bw / 2, -bh / 2, bd / 2);
  vertex(bw / 2, bh / 2, bd / 2);
  vertex(-bw / 2, bh / 2, bd / 2);
  endShape(CLOSE);
  
  // back
  beginShape();
  fill(c2);
  vertex(-bw / 2, -bh / 2, -bd / 2);
  fill(c1);
  vertex(bw / 2, -bh / 2, -bd / 2);
  vertex(bw / 2, bh / 2, -bd / 2);
  vertex(-bw / 2, bh / 2, -bd / 2);
  endShape(CLOSE);
  
  // left
  beginShape();
  fill(c1);
  vertex(-bw / 2, -bh / 2, bd / 2);
  vertex(-bw / 2, bh / 2, bd / 2);
  fill(c2);
  vertex(-bw / 2, bh / 2, -bd / 2);
  vertex(-bw / 2, -bh / 2, -bd / 2);
  endShape(CLOSE);
  
  // right
  beginShape();
  fill(c2);
  vertex(bw / 2, -bh / 2, bd / 2);
  vertex(bw / 2, bh / 2, bd / 2);
  fill(c1);
  vertex(bw / 2, bh / 2, -bd / 2);
  vertex(bw / 2, -bh / 2, -bd / 2);
  endShape(CLOSE);
}

// =====================================================
// WINDOW RESIZE
// =====================================================

function windowResized() {
  resizeCanvas(CANVAS_W, CANVAS_H);
}
</script>
</body>
</html>
