<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Box</title>
  <style>
    * { margin: 0; padding: 0; }
    body { overflow: hidden; background: #fff; }
    canvas { display: block; }
  </style>
</head>
<body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>

// ── HSB to RGB — matching p5 colorMode(HSB, 360, 100, 100, 255) ──────────────
function hsbToRgb(h, s, b) {
  s /= 100; b /= 100;
  var k = function(n) { return (n + h / 60) % 6; };
  var f = function(n) { return b - b * s * Math.max(0, Math.min(k(n), 4 - k(n), 1)); };
  return [Math.round(f(5)*255), Math.round(f(3)*255), Math.round(f(1)*255)];
}

function rnd(a, b) { return a + Math.random() * (b - a); }
function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

// ── palette — from your code ──────────────────────────────────────────────────
var palette = [310, 45, 30, 210, 270];

// ── gradient texture — exact port of your setup() gradient loop ───────────────
// hue1/hue2 = random(palette)
// sat = random(80,100), bri = random(80,100)
// per pixel y: hBlend = lerp(hue1, hue2, y/height)
function makeGradientTexture() {
  var W = 64, H = 256;
  var canvas = document.createElement('canvas');
  canvas.width = W;
  canvas.height = H;
  var ctx  = canvas.getContext('2d');
  var hue1 = pick(palette);
  var hue2 = pick(palette);
  var sat  = rnd(80, 100);
  var bri  = rnd(80, 100);

  for (var y = 0; y < H; y++) {
    var inter   = y / H;                         // map(y, 0, H, 0, 1)
    var hBlend  = hue1 + (hue2 - hue1) * inter; // lerp(hue1, hue2, inter)
    var rgb     = hsbToRgb(hBlend, sat, bri);
    ctx.fillStyle = 'rgb(' + rgb[0] + ',' + rgb[1] + ',' + rgb[2] + ')';
    ctx.fillRect(0, y, W, 1);
  }

  var tex = new THREE.CanvasTexture(canvas);
  tex.needsUpdate = true;
  return tex;
}

// ── renderer ──────────────────────────────────────────────────────────────────
var renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setClearColor(0xffffff, 1); // background(0, 0, 100) = white
document.body.appendChild(renderer.domElement);

var scene  = new THREE.Scene();
var camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 8000);

// ── lighting — from your draw() ───────────────────────────────────────────────
// ambientLight(100)
var ambLight = new THREE.AmbientLight(0xffffff, 0.6);
scene.add(ambLight);

// directionalLight(255, 255, 255, sin(frameCount*0.01), -1, cos(frameCount*0.01))
var dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
scene.add(dirLight);

// ── one box — one entry from your city loop ───────────────────────────────────
// w = random(200,400)  d = random(200,400)  h = random(300,600)
// x = 0
// z = 0 * spacing = 0  (using z index 0 from your loop)
var BW          = rnd(200, 400);
var BD          = rnd(200, 400);
var BH          = rnd(300, 600);
var pulseSpeed  = rnd(0.01, 0.03);
var pulseOffset = rnd(0, Math.PI * 2);
var BX          = 0;
var BZ          = 0 * 175; // z = 0 × spacing

// unit box scaled each frame — same as p5 box(w, h, d)
var geo  = new THREE.BoxGeometry(1, 1, 1);
var mat  = new THREE.MeshLambertMaterial({ map: makeGradientTexture(), transparent: true });
var mesh = new THREE.Mesh(geo, mat);
scene.add(mesh);

// ── camera state — exactly from your code ─────────────────────────────────────
var camZ       = 2000; // let camZ = 2000
var targetCamZ = 2000; // let targetCamZ = 2000
var camSpeed   = 0.5;  // let camSpeed = 0.5

// ── animate — frame increments 1:1 with p5 frameCount ────────────────────────
var frame = 0;

function animate() {
  requestAnimationFrame(animate);
  frame++;

  // targetCamZ -= camSpeed
  targetCamZ -= camSpeed;
  // camZ = lerp(camZ, targetCamZ, 0.05)
  camZ += (targetCamZ - camZ) * 0.05;

  // let camX = sin(frameCount * 0.005) * 50
  var camX       = Math.sin(frame * 0.005) * 50;
  // let camY = 50
  var camY       = 50;
  // let camTargetZ = camZ - 100
  var camTargetZ = camZ - 100;

  // camera(camX, camY, camZ, 0, camY, camTargetZ, 0, 1, 0)
  // p5 WEBGL: Y+ is down. Three.js: Y+ is up. Negate Y.
  camera.position.set(camX, -camY, camZ);
  camera.lookAt(0, -camY, camTargetZ);

  // directionalLight(255,255,255, sin(fc*0.01), -1, cos(fc*0.01))
  dirLight.position.set(Math.sin(frame * 0.01), -1, Math.cos(frame * 0.01));

  // pulse = 1 + 0.05 * sin(frameCount * pulseSpeed + pulseOffset)
  var pulse = 1 + 0.05 * Math.sin(frame * pulseSpeed + pulseOffset);
  // h = b.h * pulse
  var h = BH * pulse;
  // baseY = max(160 - h/2, 0)
  var baseY = Math.max(160 - h / 2, 0);

  // translate(b.x, baseY, b.z) — negate baseY for Three.js
  mesh.position.set(BX, -baseY, BZ);
  mesh.scale.set(BW, h, BD);

  // alpha = map(distanceToCam, 0, 1000, 255, 0, true) → normalised 0–1
  var dist  = Math.abs(BZ - camZ);
  var alpha = Math.max(0, Math.min(1, 1 - dist / 1000));
  mat.opacity = alpha;

  renderer.render(scene, camera);
}

animate();

window.addEventListener('resize', function() {
  renderer.setSize(window.innerWidth, window.innerHeight);
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
});

</script>
</body>
</html>
