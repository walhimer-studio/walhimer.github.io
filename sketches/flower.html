<!doctype html>
<html lang="en">
<head>

    function gtag(){dataLayer.push(arguments);}

  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Generative Flower — p5.js</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #fff;
      width: 100%;
      height: 100%;
    }
    canvas {
      display: block;
      outline: none;
    }
  </style>
</head>
<body>
  <!-- p5.js library -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>

  <script>
  let colors = [];
  let flowerParts = [];
  let fadeSpeed = 0.01;
  let flowerScale = 1.4;
  let centerOffset = -150;

  function setup() {
    pixelDensity(1); // better performance on full screen
    createCanvas(windowWidth, windowHeight, WEBGL);
    setAttributes('alpha', true);
    frameRate(60);
    colorMode(HSB, 360, 100, 100, 255);

    colors = [
      [ color(320,100,100,120), color(345,100,100,120) ],
      [ color(200,100,100,120), color(185,100,100,120) ],
      [ color(30,100,100,120),  color(55,100,100,120)  ],
      [ color(100,100,100,120), color(85,100,100,120)  ],
      [ color(270,100,100,120), color(290,100,100,120) ],
      [ color(170,100,100,120), color(190,100,100,120) ],
      [ color(310,100,100,120), color(330,100,100,120) ],
      [ color(50,100,100,120),  color(65,100,100,120)  ]
    ];

    createFlower();
  }

  function windowResized() {
    resizeCanvas(windowWidth, windowHeight);
  }

  function createFlower() {
    flowerParts = [];

    // Center
    flowerParts.push({
      x: 0, y: centerOffset, z: 0,
      w: 60, h: 60, d: 40,
      colorSet: [ color(48,100,100,160), color(28,100,100,160) ],
      fadeOffset: 0,
      type: 'center'
    });

    // Petals
    for (let i = 0; i < 8; i++) {
      let angle = (i / 8) * TWO_PI;
      let x = cos(angle) * 120;
      let z = sin(angle) * 120;
      flowerParts.push({
        x, y: centerOffset + random(-20, 20), z,
        w: 60, h: 160, d: 25,
        colorSet: random(colors),
        fadeOffset: random(TWO_PI),
        type: 'petal',
        angle
      });
    }

    // Stem
    for (let i = 0; i < 8; i++) {
      flowerParts.push({
        x: random(-20, 20),
        y: centerOffset + 80 + i * 50,
        z: random(-20, 20),
        w: 30, h: 60, d: 30,
        colorSet: [ color(130,100,90,120), color(140,100,100,120) ],
        fadeOffset: random(TWO_PI),
        type: 'stem'
      });
    }

    // Leaves
    for (let i = 0; i < 4; i++) {
      let angle = (i / 4) * TWO_PI;
      let x = cos(angle) * 60;
      let z = sin(angle) * 60;
      flowerParts.push({
        x, y: centerOffset + 150 + i * 80, z,
        w: 90, h: 40, d: 15,
        colorSet: [ color(120,100,100,120), color(100,100,100,120) ],
        fadeOffset: random(TWO_PI),
        type: 'leaf',
        angle
      });
    }
  }

  function draw() {
    background(255);
    rotateY(millis() / 10000);
    scale(flowerScale);

    for (let part of flowerParts) {
      let transparency = map(sin(frameCount * fadeSpeed + part.fadeOffset), -1, 1, 40, 170);
      push();
      translate(part.x, part.y, part.z);

      if (part.type === 'petal') {
        rotateY(part.angle);
        rotateX(PI / 6);
      } else if (part.type === 'leaf') {
        rotateY(part.angle);
        rotateZ(PI / 4);
      }

      let c1 = color(hue(part.colorSet[0]), saturation(part.colorSet[0]), brightness(part.colorSet[0]), transparency);
      let c2 = color(hue(part.colorSet[1]), saturation(part.colorSet[1]), brightness(part.colorSet[1]), transparency);
      drawSoftGradientBox(part.w, part.h, part.d, c1, c2);
      pop();
    }
  }

  function drawSoftGradientBox(w, h, d, c1, c2) {
    noStroke();
    // Front
    beginShape();
    fill(c1); vertex(-w/2, -h/2,  d/2);
    fill(c2); vertex( w/2, -h/2,  d/2);
              vertex( w/2,  h/2,  d/2);
              vertex(-w/2,  h/2,  d/2);
    endShape(CLOSE);
    // Back
    beginShape();
    fill(c2); vertex(-w/2, -h/2, -d/2);
    fill(c1); vertex( w/2, -h/2, -d/2);
              vertex( w/2,  h/2, -d/2);
              vertex(-w/2,  h/2, -d/2);
    endShape(CLOSE);
    // Left
    beginShape();
    fill(c1); vertex(-w/2, -h/2,  d/2);
              vertex(-w/2,  h/2,  d/2);
    fill(c2); vertex(-w/2,  h/2, -d/2);
              vertex(-w/2, -h/2, -d/2);
    endShape(CLOSE);
    // Right
    beginShape();
    fill(c2); vertex( w/2, -h/2,  d/2);
              vertex( w/2,  h/2,  d/2);
    fill(c1); vertex( w/2,  h/2, -d/2);
              vertex( w/2, -h/2, -d/2);
    endShape(CLOSE);
  }
  </script>
</body>
</html>
