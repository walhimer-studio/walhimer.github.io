<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>710 (around) — Mark Walhimer</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
    }
    canvas { display: block; }
  </style>
</head>
<body>
<script>
let city = [];
let palette = [310, 45, 30, 210, 270];
let camZ = 500;
let gradientTextures = [];
let numCubes = 4;

function setup() {
  createCanvas(1500, 600, WEBGL);
  pixelDensity(2);
  frameRate(60);
  colorMode(HSB, 360, 100, 100, 255);
  noStroke();
  setAttributes('alpha', true);
  textureWrap(CLAMP);

  for (let i = 0; i < 10; i++) {
    let hue1 = random(palette);
    let hue2 = random(palette);
    let tex = createGraphics(64, 256);
    tex.colorMode(HSB, 360, 100, 100, 255);
    tex.noStroke();
    for (let y = 0; y < tex.height; y++) {
      let inter = map(y, 0, tex.height, 0, 1);
      let hBlend = lerp(hue1, hue2, inter);
      tex.fill(hBlend, 100, 100, 100);
      tex.rect(0, y, tex.width, 1);
    }
    gradientTextures.push(tex);
  }

  let w = 320;
  let d = 320;
  let h = 420;
  let gap = 0;
  let totalWidth = numCubes * w + (numCubes - 1) * gap;
  let startX = -(totalWidth / 2) + w / 2;

  for (let i = 0; i < numCubes; i++) {
    let xPos = startX + i * (w + gap);
    city.push({
      x: xPos,
      z: 0,
      w, h, d,
      tex: random(gradientTextures),
      rotY: 0,
      targetRotY: 0,
      rotDir: random() < 0.5 ? -1 : 1,
      rotating: true,
      rotSpeed: 0.003 + random(-0.001, 0.001)
    });
    city[i].targetRotY = city[i].rotY + city[i].rotDir * TWO_PI;
  }
}

function draw() {
  background(0, 0, 100);
  camera(0, 0, camZ, 0, 0, 0, 0, 1, 0);
  ambientLight(255);
  directionalLight(255, 255, 255, 0.3, -1, -0.5);
  blendMode(BLEND);

  for (let b of city) {
    if (b.rotating) {
      b.rotY += b.rotDir * b.rotSpeed;
      if (
        (b.rotDir === 1  && b.rotY >= b.targetRotY) ||
        (b.rotDir === -1 && b.rotY <= b.targetRotY)
      ) {
        b.rotY = b.targetRotY;
        b.rotating = false;
        b.rotDir = random() < 0.5 ? -1 : 1;
        b.targetRotY = b.rotY + b.rotDir * TWO_PI;
        b.rotating = true;
      }
    }
    push();
    texture(b.tex);
    translate(b.x, 0, b.z);
    rotateY(b.rotY);
    box(b.w, b.h, b.d);
    pop();
  }
}
</script>
</body>
</html>
