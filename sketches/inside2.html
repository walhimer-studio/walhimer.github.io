<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Immersive Colored Boxes (Fixed)</title>
  <style> body { margin: 0; overflow: hidden; background: black; } </style>
</head>
<body>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script>
let scene, camera, renderer;
let boxes = [];
const vividColors = [0xff00cc, 0xffff00, 0x00bfff, 0xff3300, 0x9900ff];

function init() {
  scene = new THREE.Scene();
  camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 1, 5000);
  camera.position.set(0, 0, 0);

  renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  // Ambient light only (flat, even)
  scene.add(new THREE.AmbientLight(0xffffff, 1));

  // Visual marker at the origin
  const marker = new THREE.Mesh(
    new THREE.SphereGeometry(10, 16, 16),
    new THREE.MeshBasicMaterial({ color: 0xffffff })
  );
  scene.add(marker);

  // Create concentric translucent boxes
  for (let i = 0; i < vividColors.length; i++) {
    const size = 1000 + i * 300;
    const geometry = new THREE.BoxGeometry(size, size, size);

    const material = new THREE.MeshBasicMaterial({
      color: vividColors[i],
      side: THREE.BackSide,
      transparent: true,
      opacity: 0.2
    });

    const box = new THREE.Mesh(geometry, material);
    box.userData.fadeOffset = Math.random() * Math.PI * 2;
    box.userData.opacityCurrent = 0.2;
    boxes.push(box);
    scene.add(box);
  }

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
}

function animate(time) {
  requestAnimationFrame(animate);
  const t = time * 0.001;

  scene.rotation.y = t * 0.05;
  scene.rotation.x = Math.sin(t * 0.2) * 0.05;

  boxes.forEach(box => {
    const fade = Math.sin(t + box.userData.fadeOffset);
    const target = THREE.MathUtils.mapLinear(fade, -1, 1, 0.05, 0.3);
    box.userData.opacityCurrent = THREE.MathUtils.lerp(box.userData.opacityCurrent, target, 0.05);
    box.material.opacity = box.userData.opacityCurrent;
  });

  renderer.render(scene, camera);
}

init();
animate();
</script>
</body>
</html>
